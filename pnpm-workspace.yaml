allowBuilds:
  '@parcel/watcher': true
  '@pnpm/exe': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  '@swc/core': true
  '@tailwindcss/oxide': true
  '@tree-sitter-grammars/tree-sitter-yaml': true
  '@visulima/string': true
  aws-crt: true
  core-js: true
  core-js-pure: true
  dtrace-provider: true
  edgedriver: true
  es5-ext: true
  esbuild: true
  geckodriver: true
  msw: true
  node-pty: true
  nx: true
  oxc-resolver: true
  prisma: true
  protobufjs: true
  rs-module-lexer: true
  sharp: true
  svelte-preprocess: true
  tree-sitter: true
  tree-sitter-json: true
  unrs-resolver: true
  vue-demi: true
  workerd: true
  yarn: true

auditConfig:
