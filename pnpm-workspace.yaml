packages:
  - "apps/**"
  - "packages/**"
  - "shared/**"
  - "!*/__test__/**"
  - "!*/__tests__/**"
  - "!packages/api/api-platform/__fixtures__/collect/**"
  - "!packages/api/api-platform/__fixtures__/express/**"
  - "!packages/api/api-platform/__fixtures__/framework/**"
  - "!packages/api/api-platform/__fixtures__/pages/**"
  - "!packages/error-debugging/error/__fixtures__/captured-errors.ts"
  - "!packages/tooling/tsconfig/__fixtures__/read-tsconfig/**"
  - "!packages/tooling/package/__fixtures__/package-json/**"
  - "!packages/tooling/package/__fixtures__/which-package-manager/**"
  - "!packages/tooling/package/__fixtures__/workspaces/**"
  - "!packages/storage/storage/src/adapter/nuxt"
  - "!packages/storage/storage/dist/adapter/nuxt"
  - "!packages/tooling/vis/examples/sample-workspace/**"
  - "!packages/tooling/vis/__fixtures__/sherif-lint/**"
  - "!packages/tooling/vis/__fixtures__/init/**"
  - "!packages/tooling/vis/__tests__/release/fixtures/**"
  - "!packages/tooling/vis/__bench__/cli/fixtures/**"

allowBuilds:
  '@firebase/util': false
  '@parcel/watcher': true
  '@pnpm/exe': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  '@swc/core': true
  '@tailwindcss/oxide': true
  '@tree-sitter-grammars/tree-sitter-yaml': true
  '@visulima/string': true
  aws-crt: true
  core-js: true
  core-js-pure: true
  cpu-features: false
  dtrace-provider: true
  edgedriver: true
  es5-ext: true
  esbuild: true
  geckodriver: true
  msgpackr-extract: true
  msw: true
  node-pty: true
  nx: true
  oxc-resolver: true
  prisma: true
  protobufjs: true
  rs-module-lexer: true
  sharp: true
  ssh2: false
  svelte-preprocess: true
  tree-sitter: true
  tree-sitter-json: true
  unrs-resolver: true
  vue-demi: true
  workerd: true
  yarn: true

auditConfig:
  ignoreCves:
    - CVE-2022-37620
    - CVE-2020-8203
    - CVE-2025-67898
    - CVE-2025-13465
    - CVE-2025-69874
    - CVE-2026-0540
  ignoreGhsas:
    - GHSA-chqc-8p9q-pq6q
    # lodash.set prototype pollution — dev-only path
    # (redact/__bench__ > @qiwi/masker); no patched release of the
    # frozen per-method package exists. Re-check if @qiwi/masker updates.
    - GHSA-p6mc-m468-83gw
    # js-yaml merge-key quadratic DoS — only via @yarnpkg/parsers@3.x, which
    # calls the v3-only safeLoad API (removed in v4), so we cannot move to 4.x.
    # We pin its nested js-yaml to ^3.14.2, the patched v3 backport that fixes
    # this CVE. The advisory's vulnerable range (<=4.1.1) is overly broad and
    # still flags 3.14.2 even though the fix is present. Re-check if
    # @yarnpkg/parsers adopts js-yaml v4.
    - GHSA-h67p-54hq-rp68

autoInstallPeers: true

blockExoticSubdeps: true

