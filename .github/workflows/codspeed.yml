# https://help.github.com/en/categories/automating-your-workflow-with-github-actions

name: "CodSpeed"

on: # yamllint disable-line rule:truthy
    push:
        branches: ["main", "alpha"]
    pull_request:
        types: ["opened", "synchronize", "reopened"]
        branches: ["main", "alpha", "next", "beta"]
    workflow_dispatch: # yamllint disable-line rule:empty-values

concurrency:
    group: "${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true

permissions:
    contents: "read"
    checks: "read" # to poll Check Native Build via gh api

env:
    NX_BRANCH: "${{ github.event.number || github.ref_name }}"
    NX_RUN_GROUP: "${{ github.run_id }}"

jobs:
    discover:
        name: "Discover affected benches"
        runs-on: "ubuntu-latest"
        # Wait-for-Build-Native can burn up to 55 min when runner queues
        # back up; the discover work itself is fast (~2 min). 65 absorbs
        # both with cushion.
        timeout-minutes: 105
        outputs:
            matrix: "${{ steps.affected.outputs.matrix }}"
            has-benches: "${{ steps.affected.outputs.has-benches }}"
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Wait for Build Native workflow"
              # Replaces lewagon/wait-on-check-action: its bundler Gemfile.lock pins
              # darwin-24/25 only, so macOS runners on darwin-23 fail bundle install.
              # Plain shell + gh api works on every runner without Ruby.
              # GitHub-hosted runner queue depth occasionally pushes the
              # gate job's start time 30+ minutes past the last build
              # completion — and on bad days the build matrix itself stays
              # queued long enough that the old 50-min deadline timed out
              # mid-build (check still in_progress). 85-min step ceiling +
              # 80-min internal deadline rides out those spikes; the gate
              # still exits in ~minutes in the common case, so the higher
              # ceiling only costs wall-clock when the runner pool is saturated.
              timeout-minutes: 85
              shell: "bash"
              env:
                  GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
                  REF: "${{ github.event.pull_request.head.sha || github.sha }}"
                  REPO: "${{ github.repository }}"
              run: |
                  set -euo pipefail
                  check_name="Check Native Build"
                  deadline=$(( $(date +%s) + 4800 ))
                  while :; do
                      # Transient HTTP 401s on secrets.GITHUB_TOKEN happen
                      # mid-poll (the token gets briefly rotated by Actions).
                      # `set -e` would then kill the whole job before the next
                      # iteration can retry — swallow the exit so the loop
                      # keeps going.
                      if ! payload=$(gh api -X GET "repos/${REPO}/commits/${REF}/check-runs" -f check_name="$check_name" --jq '.check_runs[0] // empty' 2>&1); then
                          echo "Transient gh api error, retrying in 15s: $payload"
                          payload=""
                      fi
                      if [ -n "$payload" ]; then
                          status=$(printf '%s' "$payload" | jq -r '.status')
                          conclusion=$(printf '%s' "$payload" | jq -r '.conclusion // ""')
                          if [ "$status" = "completed" ]; then
                              case "$conclusion" in
                                  success|skipped|neutral)
                                      echo "Check '$check_name' completed: $conclusion"
                                      exit 0
                                      ;;
                                  *)
                                      echo "Check '$check_name' failed: $conclusion"
                                      exit 1
                                      ;;
                              esac
                          fi
                          echo "Check '$check_name' status=$status, waiting 15s..."
                      else
                          echo "Check '$check_name' not yet registered, waiting 15s..."
                      fi
                      if [ "$(date +%s)" -ge "$deadline" ]; then
                          echo "Timed out waiting for '$check_name' after 80 minutes"
                          exit 1
                      fi
                      sleep 15
                  done

            - name: "Git checkout"
              uses: "anolilab/workflows/step/checkout-with-retry@6c16895f4c3b5273b373656988505d1a8264e78b" # main
              with:
                  fetch-depth: 0

            - name: "Derive appropriate SHAs for base and head for `nx affected` commands"
              id: "setSHAs"
              uses: "nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1" # v5.0.1

            - name: "Setup resources and environment"
              uses: "anolilab/workflows/step/node@acba5fb15ac98ad23dec1ad233e40e1bb79c1dae" # v19.0.4 # main
              with:
                  node-version: "22"
                  install-node-gyp: "true"
                  skip-playwright: "true"
                  # TODO: re-enable once pnpm/npm audit works with unpublished @visulima/task-runner-binding-* packages and pnpm registry config
                  run-signatures-audit: false
                  run-npm-audit: false

            - name: "Compute affected bench projects"
              id: "affected"
              shell: "bash"
              run: |
                  # `pnpm exec` leaks workspace platform-mismatch warnings to stdout
                  # (one line per native NAPI sub-package). Keep only the JSON line.
                  affected=$(pnpm exec nx show projects --affected --withTarget=test:bench --json 2>/dev/null | grep -E '^\[' | tail -n 1)
                  affected=${affected:-'[]'}

                  if [ -z "$affected" ] || [ "$affected" = "[]" ]; then
                    echo "No affected bench projects."
                    echo "has-benches=false" >> "$GITHUB_OUTPUT"
                    echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  matrix=$(echo "$affected" | jq -c '{include: [.[] | {project: .}]}')

                  echo "Affected bench projects: $affected"
                  echo "has-benches=true" >> "$GITHUB_OUTPUT"
                  echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

    benchmark:
        name: "Bench: ${{ matrix.project }}"
        needs: "discover"
        if: "${{ needs.discover.outputs.has-benches == 'true' }}"
        runs-on: "ubuntu-latest"
        timeout-minutes: 30
        # Scope the CodSpeed OIDC token to an environment so secrets and reviewer
        # rules (configured in repo settings) can apply to benchmark uploads.
        environment: "benchmarks"
        permissions:
            contents: "read"
            id-token: "write" # required for OIDC authentication with CodSpeed
        strategy:
            fail-fast: false
            matrix: "${{ fromJSON(needs.discover.outputs.matrix) }}"
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "anolilab/workflows/step/checkout-with-retry@6c16895f4c3b5273b373656988505d1a8264e78b" # main

            - name: "Setup resources and environment"
              uses: "anolilab/workflows/step/node@acba5fb15ac98ad23dec1ad233e40e1bb79c1dae" # v19.0.4 # main
              with:
                  node-version: "22"
                  install-node-gyp: "true"
                  skip-playwright: "true"
                  # TODO: re-enable once pnpm/npm audit works with unpublished @visulima/task-runner-binding-* packages and pnpm registry config
                  run-signatures-audit: false
                  run-npm-audit: false

            # Pull the host-matching binaries produced by build-native.yml so benches that require
            # a compiled native binding (e.g. @visulima/tui, @visulima/task-runner) can load it.
            #
            # `secrets.GITHUB_TOKEN` returns transient HTTP 401 mid-download
            # (observed on multi-MB artifact runs); dawidd6's v21 doesn't
            # retry on auth failure, so wrap the step with a two-shot retry.
            - name: "Download native build artifacts"
              id: "download_native_artifacts"
              continue-on-error: true
              uses: "dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151" # v21
              with:
                  workflow: "build-native.yml"
                  commit: "${{ github.event.pull_request.head.sha || github.sha }}"
                  name: "bindings-(.+)"
                  name_is_regexp: true
                  path: "artifacts"
                  if_no_artifact_found: "warn"
                  allow_forks: false

            - name: "Wait before retrying artifact download"
              if: "steps.download_native_artifacts.outcome == 'failure'"
              shell: "bash"
              run: "sleep 30"

            - name: "Download native build artifacts (retry)"
              if: "steps.download_native_artifacts.outcome == 'failure'"
              # If the retry also 401s, distribute below will detect the
              # missing artifacts dir and continue — preferable to failing
              # the entire bench job on a transient token rotation.
              continue-on-error: true
              uses: "dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151" # v21
              with:
                  workflow: "build-native.yml"
                  commit: "${{ github.event.pull_request.head.sha || github.sha }}"
                  name: "bindings-(.+)"
                  name_is_regexp: true
                  path: "artifacts"
                  if_no_artifact_found: "warn"
                  allow_forks: false

            - name: "Distribute native artifacts to package roots"
              shell: "bash"
              run: |
                  if [ ! -d artifacts ]; then
                    echo "no native artifacts downloaded, skipping distribution"
                    exit 0
                  fi

                  find artifacts -name "task-runner-native.*.node" -exec mv {} packages/tooling/task-runner/ \; 2>/dev/null || true
                  find artifacts -name "tui-native.*.node" -exec mv {} packages/terminal/tui/ \; 2>/dev/null || true
                  find artifacts -name "vis-native.*.node" -exec mv {} packages/tooling/vis/ \; 2>/dev/null || true
                  find artifacts -name "secret-scanner-native.*.node" -exec mv {} packages/tooling/secret-scanner/ \; 2>/dev/null || true

                  rm -rf artifacts/

            - name: "Build only this bench's library dependencies"
              env:
                  BENCH_PROJECT: "${{ matrix.project }}"
              shell: "bash"
              run: |
                  pnpm exec nx graph --focus="$BENCH_PROJECT" --file=/tmp/bench-graph.json >/dev/null
                  focused=$(jq -r '.graph.nodes | keys[]' /tmp/bench-graph.json | sort -u)
                  buildable=$(pnpm exec nx show projects --withTarget=build:prod --json | grep -E '^\[' | tail -n 1 | jq -r '.[]' | sort -u)
                  deps=$(comm -12 <(echo "$focused") <(echo "$buildable") | paste -sd, -)

                  if [ -z "$deps" ]; then
                    echo "No buildable deps for $BENCH_PROJECT, skipping build."
                    exit 0
                  fi

                  echo "Building deps for $BENCH_PROJECT: $deps"
                  pnpm exec nx run-many --target=build:prod --projects="$deps" --nxBail

            - name: "Run benchmark"
              env:
                  BENCH_PROJECT: "${{ matrix.project }}"
              uses: "CodSpeedHQ/action@63f3e98b61959fe67f146a3ff022e4136fe9bb9c" # v4.17.6
              with:
                  mode: "simulation"
                  run: "pnpm exec nx run \"$BENCH_PROJECT\":test:bench"
