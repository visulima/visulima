# vis release ci snapshot — preview-release workflow (RFC §13).
#
# Replaces preview-release.yaml once §17.3 Phase 5 completes.
# Publishes 0.0.0-pr-<n>-<sha> snapshots of affected packages and posts
# install instructions as a sticky PR comment.

name: "vis release snapshot"

on: # yamllint disable-line rule:truthy
    pull_request:
        types: ["opened", "synchronize", "reopened"]

concurrency:
    group: "vis-release-snapshot-${{ github.event.pull_request.number }}"
    cancel-in-progress: true

permissions:
    contents: "read"
    pull-requests: "write"
    id-token: "write"

jobs:
    snapshot:
        name: "Snapshot"
        runs-on: "ubuntu-latest"
        # Gate NPM_TOKEN behind the `release` environment so snapshot publishes
        # share the same approval/audit posture as the main release flow
        # (zizmor: secrets-without-environment).
        environment: "release"
        steps:
            - name: "Harden runner"
              uses: "step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594" # v2.16.0
              with:
                  egress-policy: "audit"

            - name: "Checkout"
              uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - name: "Setup Node + pnpm"
              uses: "anolilab/workflows/step/setup@c7103f1bfdb14c19596c4f80156c824951bfc117" # main
              with:
                  # TODO: re-enable once pnpm/npm audit works with unpublished @visulima/task-runner-binding-* packages and pnpm registry config
                  run-npm-audit: false
                  run-signatures-audit: false

            - name: "Build affected packages"
              run: "pnpm run build:affected:prod:packages"

            - name: "Publish snapshots + post sticky comment"
              run: "pnpm exec vis release ci snapshot"
              env:
                  GH_TOKEN: "${{ github.token }}"
                  NPM_TOKEN: "${{ secrets.NPM_TOKEN }}"
