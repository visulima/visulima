name: "Data Sync"

on: # yamllint disable-line rule:truthy
    schedule:
        - cron: "0 0 * * *" # At 00:00 UTC every day
    workflow_dispatch: # yamllint disable-line rule:empty-values

permissions:
    contents: "read" # for checkout

jobs:
    sync:
        name: "Sync Data Sources"
        if: "github.repository == 'visulima/visulima'"
        runs-on: "ubuntu-latest"
        timeout-minutes: 30
        permissions:
            contents: "write"

        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450" # v2.19.1
              with:
                  egress-policy: "audit"

            # Persist credentials so the downstream git-auto-commit-action can push
            # using the explicitly-passed SEMANTIC_RELEASE_GITHUB_TOKEN.
            - name: "Git checkout" # zizmor: ignore[artipacked]
              uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
              with:
                  token: "${{ secrets.SEMANTIC_RELEASE_GITHUB_TOKEN }}"
              env:
                  GIT_COMMITTER_NAME: "GitHub Actions Shell"
                  GIT_AUTHOR_NAME: "GitHub Actions Shell"
                  EMAIL: "github-actions[bot]@users.noreply.github.com"

            - name: "Setup resources and environment"
              id: "setup"
              uses: "anolilab/workflows/step/node@3c54b71af67bdd990513c4a17fa2fde078db7b74" # main
              with:
                  node-version: "22"
                  install-node-gyp: "true"
                  cache-prefix: "data-sync"
                  install-packages: "true"
                  # TODO: re-enable once pnpm/npm audit works with unpublished @visulima/task-runner-binding-* packages and pnpm registry config
                  run-npm-audit: false

            - name: "Sync disposable email domains"
              if: "success()"
              working-directory: "packages/email/disposable-email-domains"
              run: "pnpm run --filter disposable-email-domains generate:domains"

            - name: "Sync typosquats blocklist"
              if: "success()"
              working-directory: "packages/tooling/vis"
              run: "npx tsx scripts/sync-blocklist.ts"

            - name: "Commit data updates"
              if: "success()"
              uses: "stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9" # v7.1.0
              with:
                  file_pattern: |
                      packages/email/disposable-email-domains/dist/domains.json
                      packages/email/disposable-email-domains/README.md
                      packages/tooling/vis/data/typosquats.json
                  commit_message: "fix: sync data sources (disposable email domains, typosquats blocklist)"
                  commit_user_name: "github-actions-shell"
                  commit_user_email: "github-actions[bot]@users.noreply.github.com"
                  commit_author: "github-actions-shell <github-actions[bot]@users.noreply.github.com>"
                  skip_dirty_check: "true"
