# https://help.github.com/en/categories/automating-your-workflow-with-github-actions

name: "Cargo Test"

on: # yamllint disable-line rule:truthy
    workflow_dispatch: # yamllint disable-line rule:empty-values
    pull_request:
        types: ["opened", "synchronize"]
        paths:
            - "packages/tooling/task-runner/native/**"
            - "packages/terminal/tui/native/**"
            - "packages/tooling/vis/native/**"
            - ".github/workflows/cargo-test.yml"
    push:
        branches:
            - "main"
            - "alpha"
        paths:
            - "packages/tooling/task-runner/native/**"
            - "packages/terminal/tui/native/**"
            - "packages/tooling/vis/native/**"
            - ".github/workflows/cargo-test.yml"

concurrency:
    group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}"
    cancel-in-progress: true

permissions:
    contents: "read"

env:
    CARGO_INCREMENTAL: 0

jobs:
    files-changed:
        name: "Detect Rust source changes"
        runs-on: "ubuntu-24.04"
        timeout-minutes: 3
        outputs:
            task-runner: "${{ steps.changes.outputs.task-runner }}"
            tui: "${{ steps.changes.outputs.tui }}"
            vis: "${{ steps.changes.outputs.vis }}"
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
              with:
                  persist-credentials: false

            - name: "Check for Rust source changes"
              uses: "dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d" # v4.0.1
              id: "changes"
              with:
                  filters: |
                      task-runner:
                        - 'packages/tooling/task-runner/native/src/**'
                        - 'packages/tooling/task-runner/native/Cargo.toml'
                        - 'packages/tooling/task-runner/native/Cargo.lock'
                      tui:
                        - 'packages/terminal/tui/native/src/**'
                        - 'packages/terminal/tui/native/Cargo.toml'
                        - 'packages/terminal/tui/native/Cargo.lock'
                      vis:
                        - 'packages/tooling/vis/native/src/**'
                        - 'packages/tooling/vis/native/Cargo.toml'
                        - 'packages/tooling/vis/native/Cargo.lock'

    test:
        name: "Test ${{ matrix.package.name }}"
        needs: "files-changed"
        if: |
            github.event_name == 'workflow_dispatch' ||
            needs.files-changed.outputs.task-runner == 'true' ||
            needs.files-changed.outputs.tui == 'true' ||
            needs.files-changed.outputs.vis == 'true'
        runs-on: "ubuntu-24.04"
        timeout-minutes: 15
        strategy:
            fail-fast: false
            matrix:
                package:
                    - name: "task-runner"
                      dir: "packages/tooling/task-runner/native"
                      changed: "${{ needs.files-changed.outputs.task-runner }}"
                    - name: "tui"
                      dir: "packages/terminal/tui/native"
                      changed: "${{ needs.files-changed.outputs.tui }}"
                    - name: "vis"
                      dir: "packages/tooling/vis/native"
                      changed: "${{ needs.files-changed.outputs.vis }}"
                exclude:
                    - package:
                          changed: "false"
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
              with:
                  persist-credentials: false

            - name: "Install Rust stable toolchain"
              uses: "dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9" # v1
              with:
                  toolchain: "stable"

            - name: "Restore Cargo cache"
              id: "cargo-cache"
              uses: "actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      ${{ matrix.package.dir }}/target
                  key: "cargo-test-${{ matrix.package.name }}-${{ hashFiles(format('{0}/Cargo.lock', matrix.package.dir)) }}"
                  restore-keys: |
                      cargo-test-${{ matrix.package.name }}-

            - name: "Run cargo test"
              working-directory: "${{ matrix.package.dir }}"
              run: "cargo test --verbose"

            - name: "Run cargo clippy"
              working-directory: "${{ matrix.package.dir }}"
              run: "cargo clippy -- -D warnings"
              continue-on-error: true

            # Only write the cache from trusted refs. PRs restore but never save,
            # so a fork can't poison the cache for downstream runs.
            - name: "Save Cargo cache"
              if: "github.event_name == 'push' && steps.cargo-cache.outputs.cache-hit != 'true'"
              uses: "actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      ${{ matrix.package.dir }}/target
                  key: "${{ steps.cargo-cache.outputs.cache-primary-key }}"

    cargo-test-required-check:
        name: "Cargo Test Status"
        needs: ["files-changed", "test"]
        if: "always()"
        runs-on: "ubuntu-24.04"
        timeout-minutes: 1
        steps:
            - name: "Verify test results"
              # No untrusted input used in this step -- only workflow result values
              run: |
                  if [ "$RESULT" = "failure" ]; then
                    echo "Rust tests failed"
                    exit 1
                  fi
                  echo "All Rust tests passed (or skipped)"
              env:
                  RESULT: "${{ needs.test.result }}"
