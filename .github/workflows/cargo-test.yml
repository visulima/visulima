# https://help.github.com/en/categories/automating-your-workflow-with-github-actions

name: "Cargo Test"

on: # yamllint disable-line rule:truthy
    workflow_dispatch: # yamllint disable-line rule:empty-values
    pull_request:
        types: ["opened", "synchronize"]
        paths:
            - "packages/tooling/task-runner/native/**"
            - "packages/terminal/tui/native/**"
            - "packages/tooling/vis/native/**"
            - ".github/workflows/cargo-test.yml"
    push:
        branches:
            - "main"
            - "alpha"
        paths:
            - "packages/tooling/task-runner/native/**"
            - "packages/terminal/tui/native/**"
            - "packages/tooling/vis/native/**"
            - ".github/workflows/cargo-test.yml"

concurrency:
    group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}"
    cancel-in-progress: true

permissions:
    contents: "read"

env:
    CARGO_INCREMENTAL: 0

jobs:
    files-changed:
        name: "Detect Rust source changes"
        runs-on: "ubuntu-24.04"
        timeout-minutes: 3
        outputs:
            task-runner: "${{ steps.changes.outputs.task-runner }}"
            tui: "${{ steps.changes.outputs.tui }}"
            vis: "${{ steps.changes.outputs.vis }}"
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594" # v2.16.0
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1
              with:
                  persist-credentials: false

            - name: "Check for Rust source changes"
              uses: "dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36" # v3.0.2
              id: "changes"
              with:
                  filters: |
                      task-runner:
                        - 'packages/tooling/task-runner/native/src/**'
                        - 'packages/tooling/task-runner/native/Cargo.toml'
                        - 'packages/tooling/task-runner/native/Cargo.lock'
                      tui:
                        - 'packages/terminal/tui/native/src/**'
                        - 'packages/terminal/tui/native/Cargo.toml'
                        - 'packages/terminal/tui/native/Cargo.lock'
                      vis:
                        - 'packages/tooling/vis/native/src/**'
                        - 'packages/tooling/vis/native/Cargo.toml'
                        - 'packages/tooling/vis/native/Cargo.lock'

    test:
        name: "Test ${{ matrix.package.name }}"
        needs: "files-changed"
        if: |
            github.event_name == 'workflow_dispatch' ||
            needs.files-changed.outputs.task-runner == 'true' ||
            needs.files-changed.outputs.tui == 'true' ||
            needs.files-changed.outputs.vis == 'true'
        runs-on: "ubuntu-24.04"
        timeout-minutes: 15
        strategy:
            fail-fast: false
            matrix:
                package:
                    - name: "task-runner"
                      dir: "packages/tooling/task-runner/native"
                      changed: "${{ needs.files-changed.outputs.task-runner }}"
                    - name: "tui"
                      dir: "packages/terminal/tui/native"
                      changed: "${{ needs.files-changed.outputs.tui }}"
                    - name: "vis"
                      dir: "packages/tooling/vis/native"
                      changed: "${{ needs.files-changed.outputs.vis }}"
                exclude:
                    - package:
                          changed: "false"
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594" # v2.16.0
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1
              with:
                  persist-credentials: false

            - name: "Install Rust stable toolchain"
              uses: "dtolnay/rust-toolchain@a54c7afa936fefeb4456b2dd8068152669aa8203" # stable
              with:
                  toolchain: "stable"

            - name: "Cache Cargo registry and build"
              uses: "actions/cache@5a3ec84eff668545956fd18022155c47e93e2684" # v4.2.3
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      ${{ matrix.package.dir }}/target
                  key: "cargo-test-${{ matrix.package.name }}-${{ hashFiles(format('{0}/Cargo.lock', matrix.package.dir)) }}"
                  restore-keys: |
                      cargo-test-${{ matrix.package.name }}-

            - name: "Run cargo test"
              working-directory: "${{ matrix.package.dir }}"
              run: "cargo test --verbose"

            - name: "Run cargo clippy"
              working-directory: "${{ matrix.package.dir }}"
              run: "cargo clippy -- -D warnings"
              continue-on-error: true

    cargo-test-required-check:
        name: "Cargo Test Status"
        needs: ["files-changed", "test"]
        if: "always()"
        runs-on: "ubuntu-24.04"
        timeout-minutes: 1
        steps:
            - name: "Verify test results"
              # No untrusted input used in this step -- only workflow result values
              run: |
                  if [ "$RESULT" = "failure" ]; then
                    echo "Rust tests failed"
                    exit 1
                  fi
                  echo "All Rust tests passed (or skipped)"
              env:
                  RESULT: "${{ needs.test.result }}"
