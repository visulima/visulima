# vis release ci check — PR comment with the release plan (RFC §16.1).
#
# Runs on every PR; posts/updates a sticky comment showing which
# packages will release if the PR merges.

name: "vis release check"

on: # yamllint disable-line rule:truthy
    pull_request:
        types: ["opened", "synchronize", "reopened"]

permissions:
    contents: "read"
    pull-requests: "write"

jobs:
    check:
        name: "Release plan comment"
        runs-on: "ubuntu-latest"
        steps:
            - name: "Harden runner"
              uses: "step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594" # v2.16.0
              with:
                  egress-policy: "audit"

            - name: "Checkout"
              uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - name: "Setup Node + pnpm"
              uses: "anolilab/workflows/step/setup@c7103f1bfdb14c19596c4f80156c824951bfc117" # main
              with:
                  # TODO: re-enable once pnpm/npm audit works with unpublished @visulima/task-runner-binding-* packages and pnpm registry config
                  run-npm-audit: false
                  run-signatures-audit: false

            # Build @visulima/vis (+ its workspace deps) so `pnpm exec vis`
            # resolves the freshly-built dist/bin.js rather than a missing bin.
            - name: "Build vis"
              run: "pnpm --filter @visulima/vis... run build"

            - name: "Run vis release ci check"
              run: "pnpm exec vis release ci check"
              env:
                  GH_TOKEN: "${{ github.token }}"
