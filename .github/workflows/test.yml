# https://help.github.com/en/categories/automating-your-workflow-with-github-actions

name: "Tests"

on: # yamllint disable-line rule:truthy
    pull_request:
        types: ["opened", "synchronize", "reopened"]
        branches: ["main", "alpha", "next", "beta"]
    merge_group: # yamllint disable-line rule:empty-values

concurrency:
    group: "${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true

permissions:
    contents: "read" # to fetch code (actions/checkout)
    checks: "read" # to poll Check Native Build via gh api

env:
    NX_BRANCH: "${{ github.event.number }}"
    NX_RUN_GROUP: "${{ github.run_id }}"
    HEAD_REF: "${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}"
    HEAD_REPOSITORY: "${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}"

jobs:
    files-changed:
        name: "Detect what files changed"
        runs-on: "ubuntu-24.04"
        timeout-minutes: 3
        # Map a step output to a job output. dorny/paths-filter calls the
        # GitHub API on first run, which intermittently 401s on the rotating
        # secrets.GITHUB_TOKEN — fall back to the retry step's outputs.
        outputs:
            packages: "${{ steps.changes.outputs.packages || steps.changes_retry.outputs.packages }}"
            codecov: "${{ steps.changes.outputs.codecov || steps.changes_retry.outputs.codecov }}"
            tsconfig: "${{ steps.changes.outputs.tsconfig || steps.changes_retry.outputs.tsconfig }}"
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920" # v2.20.0
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
              with:
                  persist-credentials: false
              env:
                  GIT_COMMITTER_NAME: "GitHub Actions Shell"
                  GIT_AUTHOR_NAME: "GitHub Actions Shell"
                  EMAIL: "github-actions[bot]@users.noreply.github.com"

            - name: "Check for file changes"
              uses: "dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706" # v4.0.2
              id: "changes"
              continue-on-error: true
              with:
                  token: "${{ github.token }}"
                  filters: ".github/file-filters.yml"

            - name: "Wait before retrying path filter"
              if: "steps.changes.outcome == 'failure'"
              shell: "bash"
              run: "sleep 30"

            - name: "Check for file changes (retry)"
              if: "steps.changes.outcome == 'failure'"
              uses: "dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706" # v4.0.2
              id: "changes_retry"
              with:
                  token: "${{ github.token }}"
                  filters: ".github/file-filters.yml"

    test:
        name: >-
          Test (node-${{ matrix.node_version }}, ${{ matrix.os }}${{ matrix.deno_version && format(', deno {0}', matrix.deno_version) || '' }}${{ matrix.bun_version && format(', bun {0}', matrix.bun_version) || '' }})
        if: "needs.files-changed.outputs.packages == 'true'"
        needs: "files-changed"
        # "Wait for Build Native workflow" routinely burns 17-22 min on this
        # job before tests even start; runner-queue spikes have pushed that
        # past 30 and, on saturated days, past the old 50-min cap. 130 min
        # absorbs an 80-min wait (with cushion) plus the ~20-min test phase,
        # without cancelling the matrix mid-tests.
        timeout-minutes: 130
        strategy:
            matrix:
                include:
                    - os: "ubuntu-latest"
                      node_version: "22"
                    - os: "ubuntu-latest"
                      node_version: "24"
                    - os: "ubuntu-latest"
                      node_version: "25"
                    - os: "macos-15"
                      node_version: "22"
                    - os: "windows-latest"
                      node_version: "22"
                    - os: "ubuntu-latest"
                      node_version: "22"
                      bun_version: "latest"
                    - os: "ubuntu-latest"
                      node_version: "22"
                      deno_version: "lts"
            fail-fast: false
        runs-on: "${{ matrix.os }}"
        env:
            NODE: "${{ matrix.node_version }}"
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920" # v2.20.0
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "anolilab/workflows/step/checkout-with-retry@aa162a984a4909f412bc4dbae712def066a0a681" # v20.2.5 # main
              with:
                  fetch-depth: 0

            - name: "Derive appropriate SHAs for base and head for `nx affected` commands"
              id: "setSHAs"
              uses: "nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1" # v5.0.1

            - name: "Setup resources and environment"
              id: "setup"
              uses: "anolilab/workflows/step/node@aa162a984a4909f412bc4dbae712def066a0a681" # v20.2.5 # v19.0.4 # main
              with:
                  node-version: "${{ matrix.node_version }}"
                  install-node-gyp: "true"
                  install-bun: "matrix.os == 'ubuntu-latest'"
                  skip-playwright: "true"
                  # The setup action's default `npm install --global npm@latest` exists only
                  # to enable publish provenance, which the test job never needs. npm@12 dropped
                  # support for the Node 25 current line (engines require >=26.0.0), so the
                  # upgrade fails the node-25 matrix leg. The runner's bundled npm is fine here.
                  upgrade-npm-version: false
                  # TODO: re-enable once pnpm/npm audit works with unpublished @visulima/task-runner-binding-* packages and pnpm registry config
                  run-signatures-audit: false
                  run-npm-audit: false

            - name: "Setup Deno"
              if: "matrix.os == 'ubuntu-latest' && matrix.node_version == 22 && matrix.deno_version"
              uses: "denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed" # v2.0.5
              with:
                  deno-version: "${{ matrix.deno_version }}"
                  # cache: true would tell the action's post-step to save
                  # $DENO_DIR, but nothing in this job actually invokes deno
                  # (the matrix entry only makes the binary available — tests
                  # still run via node/vitest). The empty cache path then
                  # fails Post Setup Deno with "Path Validation Error".
                  cache: false
            - name: "Setup Bun"
              if: "matrix.os == 'ubuntu-latest' && matrix.node_version == 22 && matrix.bun_version"
              uses: "oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6" # v2.2.0
              with:
                  bun-version: "${{ matrix.bun_version }}"

            - name: "Wait for Build Native workflow"
              # Replaces lewagon/wait-on-check-action: its bundler Gemfile.lock pins
              # darwin-24/25 only, so macOS runners on darwin-23 fail bundle install.
              # Plain shell + gh api works on every runner without Ruby.
              # GitHub-hosted runner queue depth occasionally pushes the
              # gate job's start time 30+ minutes past the last build
              # completion — and on bad days the build matrix itself stays
              # queued long enough that the old 50-min deadline timed out
              # mid-build (check still in_progress). 85-min step ceiling +
              # 80-min internal deadline rides out those spikes; the gate
              # still exits in ~minutes in the common case, so the higher
              # ceiling only costs wall-clock when the runner pool is saturated.
              timeout-minutes: 85
              shell: "bash"
              env:
                  GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
                  REF: "${{ github.event.pull_request.head.sha || github.sha }}"
                  REPO: "${{ github.repository }}"
              run: |
                  set -euo pipefail
                  check_name="Check Native Build"
                  deadline=$(( $(date +%s) + 4800 ))
                  while :; do
                      # Transient HTTP 401s on secrets.GITHUB_TOKEN happen
                      # mid-poll (the token gets briefly rotated by Actions).
                      # `set -e` would then kill the whole job before the next
                      # iteration can retry — swallow the exit so the loop
                      # keeps going.
                      if ! payload=$(gh api -X GET "repos/${REPO}/commits/${REF}/check-runs" -f check_name="$check_name" --jq '.check_runs[0] // empty' 2>&1); then
                          echo "Transient gh api error, retrying in 15s: $payload"
                          payload=""
                      fi
                      if [ -n "$payload" ]; then
                          status=$(printf '%s' "$payload" | jq -r '.status')
                          conclusion=$(printf '%s' "$payload" | jq -r '.conclusion // ""')
                          if [ "$status" = "completed" ]; then
                              case "$conclusion" in
                                  success|skipped|neutral)
                                      echo "Check '$check_name' completed: $conclusion"
                                      exit 0
                                      ;;
                                  *)
                                      echo "Check '$check_name' failed: $conclusion"
                                      exit 1
                                      ;;
                              esac
                          fi
                          echo "Check '$check_name' status=$status, waiting 15s..."
                      else
                          echo "Check '$check_name' not yet registered or token blip, waiting 15s..."
                      fi
                      if [ "$(date +%s)" -ge "$deadline" ]; then
                          echo "Timed out waiting for '$check_name' after 80 minutes"
                          exit 1
                      fi
                      sleep 15
                  done

            # Pull the host-matching binaries produced by build-native.yml so tests that require
            # a compiled native binding (e.g. @visulima/secret-scanner) can load it. Without this
            # the .node files only exist in the build-native runner — test runs fail at
            # require('./<pkg>-native.linux-x64-gnu.node').
            #
            # `secrets.GITHUB_TOKEN` returns transient HTTP 401 mid-download
            # (observed on multi-MB artifact runs); dawidd6's v21 doesn't
            # retry on auth failure, so wrap the step with a two-shot retry.
            - name: "Download native build artifacts"
              id: "download_native_artifacts"
              continue-on-error: true
              uses: "dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151" # v21
              with:
                  workflow: "build-native.yml"
                  commit: "${{ github.event.pull_request.head.sha || github.sha }}"
                  name: "bindings-(.+)"
                  name_is_regexp: true
                  path: "artifacts"
                  if_no_artifact_found: "warn"
                  allow_forks: false

            - name: "Wait before retrying artifact download"
              if: "steps.download_native_artifacts.outcome == 'failure'"
              shell: "bash"
              run: "sleep 30"

            - name: "Download native build artifacts (retry)"
              if: "steps.download_native_artifacts.outcome == 'failure'"
              # No continue-on-error here: if the retry also fails, fail loud
              # rather than silently running native-binding-dependent tests
              # (secret-scanner, task-runner, etc.) against missing bindings.
              uses: "dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151" # v21
              with:
                  workflow: "build-native.yml"
                  commit: "${{ github.event.pull_request.head.sha || github.sha }}"
                  name: "bindings-(.+)"
                  name_is_regexp: true
                  path: "artifacts"
                  if_no_artifact_found: "warn"
                  allow_forks: false

            - name: "Distribute native artifacts to package roots"
              shell: "bash"
              run: |
                  if [ ! -d artifacts ]; then
                    echo "no native artifacts downloaded, skipping distribution"
                    exit 0
                  fi

                  find artifacts -name "task-runner-native.*.node" -exec mv {} packages/tooling/task-runner/ \; 2>/dev/null || true
                  find artifacts -name "tui-native.*.node" -exec mv {} packages/terminal/tui/ \; 2>/dev/null || true
                  find artifacts -name "vis-native.*.node" -exec mv {} packages/tooling/vis/ \; 2>/dev/null || true
                  find artifacts -name "secret-scanner-native.*.node" -exec mv {} packages/tooling/secret-scanner/ \; 2>/dev/null || true

                  # Restore the task-runner sidecars into their binding-package
                  # dirs (the .node moves above don't carry them). Without this,
                  # the seccomp + macOS-interpose integration tests can't find
                  # the helper/dylib and silently skip instead of validating.
                  for sidecar in fspy-seccomp-helper fspy-macos.dylib fspy-windows.dll; do
                      find artifacts -path "*/npm/*/$sidecar" -print0 2>/dev/null | while IFS= read -r -d "" f; do
                          binding="$(basename "$(dirname "$f")")"
                          mkdir -p "packages/tooling/task-runner/npm/$binding"
                          install -m 0755 "$f" "packages/tooling/task-runner/npm/$binding/$sidecar" 2>/dev/null || true
                      done
                  done

                  # Restore the vis CLI front-end binary into its binding-package
                  # dirs so the CLI front-end integration test resolves it instead
                  # of skipping. Both vis-native-cli (unix) and .exe (Windows) match.
                  find artifacts -path "*/bindings-vis-*/npm/*/vis-native-cli*" -print0 2>/dev/null | while IFS= read -r -d "" f; do
                      binding="$(basename "$(dirname "$f")")"
                      mkdir -p "packages/tooling/vis/npm/$binding"
                      install -m 0755 "$f" "packages/tooling/vis/npm/$binding/$(basename "$f")" 2>/dev/null || true
                  done

                  rm -rf artifacts/

            # The codecov step below consumes the changed-files list; nx
            # affected detection itself uses NX_BASE/NX_HEAD env vars set
            # by nrwl/nx-set-shas, so we don't pass --files= to the build/
            # test scripts (that hits the kernel argv size limit on long
            # diffs).
            - name: "Get changed files"
              id: "files"
              uses: "tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96" # v47.0.6
              with:
                  files_ignore_from_source_file: ".github/ignore-files-for-nx-affected.yml"
                  base_sha: "${{ steps.setSHAs.outputs.base }}"
                  separator: ","

            - name: "Build"
              run: "pnpm run build:affected:packages"

            - name: "Run tests"
              shell: "bash"
              run: |
                  if [[ ${{ matrix.os }} == "ubuntu-latest" && ${{ matrix.node_version }} == 22 && ${{ !matrix.deno_version }} && ${{ !matrix.bun_version }} ]]; then
                      pnpm run test:affected:coverage
                  else
                      pnpm run test:affected
                  fi

            # Inlined replacement for `anolilab/workflows/step/codecov`.
            # Upstream discovers projects via `pnpm nx show projects --projects "packages/*"`,
            # which (a) returns nothing here because our packages live at
            # `packages/<category>/<name>/`, and (b) leaks pnpm
            # platform-mismatch warnings (one per NAPI subpackage) into the
            # captured array so warning lines become fake "projects" and
            # codecov fails with `--fail-on-error` against a path that
            # doesn't exist. The filesystem walk also exits 0 on
            # config-only PRs where no coverage was produced.
            # Tracking upstream fix at anolilab/workflows#397.
            - name: "Validate codecov.yml"
              if: "matrix.os == 'ubuntu-latest' && matrix.node_version == 22 && !matrix.deno_version && !matrix.bun_version && needs.files-changed.outputs.codecov == 'true'"
              shell: "bash"
              run: "curl --fail-with-body --data-binary @codecov.yml https://codecov.io/validate"

            # Upload per-package coverage via the shared local composite action
            # (see .github/actions/codecov-upload). `continue-on-error` keeps a
            # transient Codecov/keyserver hiccup from failing the Tests gate —
            # coverage upload is reporting, not test correctness.
            - name: "Upload code coverage to codecov"
              if: "matrix.os == 'ubuntu-latest' && matrix.node_version == 22 && !matrix.deno_version && !matrix.bun_version"
              continue-on-error: true
              uses: "./.github/actions/codecov-upload"
              with:
                  token: "${{ secrets.CODECOV_TOKEN }}"
                  run-id: "${{ github.run_id }}"
                  exclude-projects: "pail-bench,redact-bench,colorize-bench,inspector-bench,docs,storybook"

    browser-test:
        name: "Browser Test (${{ matrix.browser }})"
        if: "needs.files-changed.outputs.packages == 'true'"
        needs: "files-changed"
        strategy:
            fail-fast: false
            matrix:
                include:
                    - browser: "chrome"
                      os: "ubuntu-latest"
                    - browser: "firefox"
                      os: "ubuntu-latest"
                    - browser: "webkit"
                      os: "macos-15"
        runs-on: "${{ matrix.os }}"
        # Mirrors the `test` job ceiling: Build Native wait may eat up to
        # 55 min when runner queues back up; browser tests + install need
        # the remaining buffer. 90 min absorbs both without cancelling.
        timeout-minutes: 130
        env:
            NODE: "22"
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920" # v2.20.0
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "anolilab/workflows/step/checkout-with-retry@aa162a984a4909f412bc4dbae712def066a0a681" # v20.2.5 # main
              with:
                  fetch-depth: 0

            - name: "Derive appropriate SHAs for base and head for `nx affected` commands"
              id: "setSHAs"
              uses: "nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1" # v5.0.1

            - name: "Setup resources and environment"
              id: "setup"
              uses: "anolilab/workflows/step/node@aa162a984a4909f412bc4dbae712def066a0a681" # v20.2.5 # v19.0.4 # main
              with:
                  node-version: "22"
                  install-node-gyp: "true"
                  skip-playwright: "false"
                  # TODO: re-enable once pnpm/npm audit works with unpublished @visulima/task-runner-binding-* packages and pnpm registry config
                  run-signatures-audit: false
                  run-npm-audit: false

            - name: "Wait for Build Native workflow"
              # Replaces lewagon/wait-on-check-action: its bundler Gemfile.lock pins
              # darwin-24/25 only, so macOS runners on darwin-23 fail bundle install.
              # Plain shell + gh api works on every runner without Ruby.
              # GitHub-hosted runner queue depth occasionally pushes the
              # gate job's start time 30+ minutes past the last build
              # completion — and on bad days the build matrix itself stays
              # queued long enough that the old 50-min deadline timed out
              # mid-build (check still in_progress). 85-min step ceiling +
              # 80-min internal deadline rides out those spikes; the gate
              # still exits in ~minutes in the common case, so the higher
              # ceiling only costs wall-clock when the runner pool is saturated.
              timeout-minutes: 85
              shell: "bash"
              env:
                  GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
                  REF: "${{ github.event.pull_request.head.sha || github.sha }}"
                  REPO: "${{ github.repository }}"
              run: |
                  set -euo pipefail
                  check_name="Check Native Build"
                  deadline=$(( $(date +%s) + 4800 ))
                  while :; do
                      # Transient HTTP 401s on secrets.GITHUB_TOKEN happen
                      # mid-poll (the token gets briefly rotated by Actions).
                      # `set -e` would then kill the whole job before the next
                      # iteration can retry — swallow the exit so the loop
                      # keeps going.
                      if ! payload=$(gh api -X GET "repos/${REPO}/commits/${REF}/check-runs" -f check_name="$check_name" --jq '.check_runs[0] // empty' 2>&1); then
                          echo "Transient gh api error, retrying in 15s: $payload"
                          payload=""
                      fi
                      if [ -n "$payload" ]; then
                          status=$(printf '%s' "$payload" | jq -r '.status')
                          conclusion=$(printf '%s' "$payload" | jq -r '.conclusion // ""')
                          if [ "$status" = "completed" ]; then
                              case "$conclusion" in
                                  success|skipped|neutral)
                                      echo "Check '$check_name' completed: $conclusion"
                                      exit 0
                                      ;;
                                  *)
                                      echo "Check '$check_name' failed: $conclusion"
                                      exit 1
                                      ;;
                              esac
                          fi
                          echo "Check '$check_name' status=$status, waiting 15s..."
                      else
                          echo "Check '$check_name' not yet registered or token blip, waiting 15s..."
                      fi
                      if [ "$(date +%s)" -ge "$deadline" ]; then
                          echo "Timed out waiting for '$check_name' after 80 minutes"
                          exit 1
                      fi
                      sleep 15
                  done

            # Pull the host-matching binaries produced by build-native.yml so tests that require
            # a compiled native binding (e.g. @visulima/secret-scanner) can load it. Without this
            # the .node files only exist in the build-native runner — test runs fail at
            # require('./<pkg>-native.linux-x64-gnu.node').
            #
            # `secrets.GITHUB_TOKEN` returns transient HTTP 401 mid-download
            # (observed on multi-MB artifact runs); dawidd6's v21 doesn't
            # retry on auth failure, so wrap the step with a two-shot retry.
            - name: "Download native build artifacts"
              id: "download_native_artifacts"
              continue-on-error: true
              uses: "dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151" # v21
              with:
                  workflow: "build-native.yml"
                  commit: "${{ github.event.pull_request.head.sha || github.sha }}"
                  name: "bindings-(.+)"
                  name_is_regexp: true
                  path: "artifacts"
                  if_no_artifact_found: "warn"
                  allow_forks: false

            - name: "Wait before retrying artifact download"
              if: "steps.download_native_artifacts.outcome == 'failure'"
              shell: "bash"
              run: "sleep 30"

            - name: "Download native build artifacts (retry)"
              if: "steps.download_native_artifacts.outcome == 'failure'"
              # No continue-on-error here: if the retry also fails, fail loud
              # rather than silently running native-binding-dependent tests
              # (secret-scanner, task-runner, etc.) against missing bindings.
              uses: "dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151" # v21
              with:
                  workflow: "build-native.yml"
                  commit: "${{ github.event.pull_request.head.sha || github.sha }}"
                  name: "bindings-(.+)"
                  name_is_regexp: true
                  path: "artifacts"
                  if_no_artifact_found: "warn"
                  allow_forks: false

            - name: "Distribute native artifacts to package roots"
              shell: "bash"
              run: |
                  if [ ! -d artifacts ]; then
                    echo "no native artifacts downloaded, skipping distribution"
                    exit 0
                  fi

                  find artifacts -name "task-runner-native.*.node" -exec mv {} packages/tooling/task-runner/ \; 2>/dev/null || true
                  find artifacts -name "tui-native.*.node" -exec mv {} packages/terminal/tui/ \; 2>/dev/null || true
                  find artifacts -name "vis-native.*.node" -exec mv {} packages/tooling/vis/ \; 2>/dev/null || true
                  find artifacts -name "secret-scanner-native.*.node" -exec mv {} packages/tooling/secret-scanner/ \; 2>/dev/null || true

                  # Restore the task-runner sidecars into their binding-package
                  # dirs (the .node moves above don't carry them). Without this,
                  # the seccomp + macOS-interpose integration tests can't find
                  # the helper/dylib and silently skip instead of validating.
                  for sidecar in fspy-seccomp-helper fspy-macos.dylib fspy-windows.dll; do
                      find artifacts -path "*/npm/*/$sidecar" -print0 2>/dev/null | while IFS= read -r -d "" f; do
                          binding="$(basename "$(dirname "$f")")"
                          mkdir -p "packages/tooling/task-runner/npm/$binding"
                          install -m 0755 "$f" "packages/tooling/task-runner/npm/$binding/$sidecar" 2>/dev/null || true
                      done
                  done

                  # Restore the vis CLI front-end binary into its binding-package
                  # dirs so the CLI front-end integration test resolves it instead
                  # of skipping. Both vis-native-cli (unix) and .exe (Windows) match.
                  find artifacts -path "*/bindings-vis-*/npm/*/vis-native-cli*" -print0 2>/dev/null | while IFS= read -r -d "" f; do
                      binding="$(basename "$(dirname "$f")")"
                      mkdir -p "packages/tooling/vis/npm/$binding"
                      install -m 0755 "$f" "packages/tooling/vis/npm/$binding/$(basename "$f")" 2>/dev/null || true
                  done

                  rm -rf artifacts/

            - name: "Build"
              run: "pnpm run build:affected:packages"

            - name: "Install playwright"
              shell: "bash"
              run: "pnpm --filter \"inspector\" exec playwright install"

            - name: "Run ${{ matrix.browser }} browser tests"
              run: "pnpm run test:affected:browser:${{ matrix.browser }}"

    # Runs ONLY the @visulima/tsconfig package's test suite against every
    # TypeScript version it claims to support. The package emulates `tsc
    # --showConfig` and version-specific compiler-option defaults, so its parity
    # tests must be exercised against each real compiler — not just the pinned
    # catalog version. The suite version-gates specs tied to a particular release
    # (see `__tests__/helpers.ts` `tsAtLeast`/`tsBelow`), so every leg is expected
    # to be green (with some specs skipped per version). This is pure TypeScript —
    # no native bindings — so it skips the Build Native wait the other jobs need.
    tsconfig-ts-versions:
        name: "Test tsconfig (typescript ${{ matrix.ts_version }})"
        if: "needs.files-changed.outputs.tsconfig == 'true'"
        needs: "files-changed"
        runs-on: "ubuntu-latest"
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                # Every version in the `tscCompatible` union / `version-defaults`
                # dispatch. `typescript@<minor>` floats to the latest patch.
                ts_version: ["5.4", "5.5", "5.6", "5.7", "5.8", "5.9", "6.0", "7.0"]
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920" # v2.20.0
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "anolilab/workflows/step/checkout-with-retry@aa162a984a4909f412bc4dbae712def066a0a681" # v20.2.5 # main

            - name: "Setup resources and environment"
              id: "setup"
              uses: "anolilab/workflows/step/node@aa162a984a4909f412bc4dbae712def066a0a681" # v20.2.5 # main
              with:
                  node-version: "22"
                  install-node-gyp: "true"
                  cache-prefix: "tsconfig-ts-${{ matrix.ts_version }}"
                  skip-playwright: "true"
                  # This job never publishes, so the provenance-only npm upgrade is unneeded.
                  upgrade-npm-version: false
                  # TODO: re-enable once pnpm/npm audit works with unpublished @visulima/task-runner-binding-* packages.
                  run-signatures-audit: false
                  run-npm-audit: false

            # Build the package and its workspace dependencies (topological order).
            - name: "Build @visulima/tsconfig and its dependencies"
              run: "pnpm --filter \"@visulima/tsconfig...\" run build"

            # Pin the package's TypeScript to the matrix version. `pnpm add` rewrites
            # the package.json spec (from `catalog:tsc`) and the lockfile, so the
            # subsequent `vitest` run resolves this exact compiler for both
            # `import 'typescript'` and the `tsc --showConfig` parity shell-outs.
            - name: "Install typescript@${{ matrix.ts_version }}"
              run: "pnpm --filter \"@visulima/tsconfig\" add --save-dev \"typescript@${{ matrix.ts_version }}\""

            # Fail loudly if the injected compiler is not what the leg claims to test,
            # rather than silently re-running an already-covered version.
            - name: "Verify active TypeScript version"
              shell: "bash"
              working-directory: "packages/tooling/tsconfig"
              run: |
                  active="$(node -e "console.log(require('typescript').version)")"
                  echo "Active TypeScript: $active (matrix: ${{ matrix.ts_version }})"
                  case "$active" in
                      "${{ matrix.ts_version }}".*) echo "OK" ;;
                      *) echo "::error::Expected typescript ${{ matrix.ts_version }}.x but resolved $active" && exit 1 ;;
                  esac

            - name: "Run @visulima/tsconfig tests"
              run: "pnpm --filter \"@visulima/tsconfig\" run test"

    # This check runs once all dependant jobs have passed
    # It symbolizes that all required checks have successfully passed (Or skipped)
    # This check is the only required GitHub check
    test-required-check:
        needs: ["files-changed", "test", "browser-test", "tsconfig-ts-versions"]
        name: "Check Test Run"
        # This is necessary since a failed/skipped dependent job would cause this job to be skipped
        if: "always() && (needs.test.result == 'success' || needs.test.result == 'skipped') && (needs.browser-test.result == 'success' || needs.browser-test.result == 'skipped') && (needs.tsconfig-ts-versions.result == 'success' || needs.tsconfig-ts-versions.result == 'skipped')"
        runs-on: "ubuntu-24.04"
        timeout-minutes: 30
        steps:
            # If any jobs we depend on fail, we will fail since this is a required check
            # NOTE: A timeout is considered a failure
            - name: "Harden Runner"
              uses: "step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920" # v2.20.0
              with:
                  egress-policy: "audit"

            - name: "Check for failures"
              if: "contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')"
              run: |
                  echo "One of the dependent jobs have failed. You may need to re-run it." && exit 1
