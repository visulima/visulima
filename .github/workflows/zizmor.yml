name: "Zizmor"
on:
    push:
        branches: ["main", "alpha", "next", "beta"]
    pull_request:
        branches: ["main", "alpha", "next", "beta"]
permissions: {}
jobs:
    zizmor:
        permissions:
            security-events: "write"
            contents: "read"
        uses: "anolilab/workflows/.github/workflows/zizmor.yml@992a32d56bf8961a317c8d7aa5ec68af4487ae79" # v20.2.0
        with:
            min_severity: "medium"
