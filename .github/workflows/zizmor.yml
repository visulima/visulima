# https://help.github.com/en/categories/automating-your-workflow-with-github-actions

name: "Zizmor"

on: # yamllint disable-line rule:truthy
    workflow_dispatch: # yamllint disable-line rule:empty-values
    # Runs on every PR so it can be wired up as a required status check.
    # Path-filtered triggers are skipped — and "skipped" required checks block merges.
    pull_request:
        types: ["opened", "synchronize", "reopened"]
        branches: ["main", "alpha", "next", "beta"]
    push:
        branches:
            - "main"
            - "alpha"

concurrency:
    group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}"
    cancel-in-progress: true

permissions: {}

jobs:
    zizmor:
        name: "Zizmor"
        runs-on: "ubuntu-latest"
        timeout-minutes: 30
        permissions:
            security-events: "write"
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
              with:
                  persist-credentials: false

            - name: "Install zizmor"
              uses: "taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468" # v2.79.3
              with:
                  tool: "zizmor"

            # `tee` keeps the exit code from zizmor (vs `>` which always returns 0),
            # so a finding at or above --min-severity fails the PR check.
            - name: "Run zizmor"
              run: "zizmor --min-severity medium --format sarif . | tee results.sarif"
              env:
                  GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

            - name: "Upload SARIF file"
              if: "always()"
              uses: "github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba" # v4.35.5
              with:
                  sarif_file: "results.sarif"
                  category: "zizmor"
