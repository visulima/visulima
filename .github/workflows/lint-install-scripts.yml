# https://help.github.com/en/categories/automating-your-workflow-with-github-actions

name: "Lint install scripts"

on: # yamllint disable-line rule:truthy
    workflow_dispatch: # yamllint disable-line rule:empty-values
    pull_request:
        types: ["opened", "synchronize", "reopened"]
        paths:
            - "packages/tooling/vis/scripts/install.sh"
            - "packages/tooling/vis/scripts/install.ps1"
            - ".github/workflows/lint-install-scripts.yml"
    merge_group: # yamllint disable-line rule:empty-values
    push:
        branches:
            - "main"
            - "alpha"
        paths:
            - "packages/tooling/vis/scripts/install.sh"
            - "packages/tooling/vis/scripts/install.ps1"
            - ".github/workflows/lint-install-scripts.yml"

concurrency:
    group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
    cancel-in-progress: true

permissions:
    contents: "read" # to fetch code (actions/checkout)

jobs:
    shellcheck:
        name: "ShellCheck (install.sh)"
        if: "github.repository == 'visulima/visulima'"
        runs-on: "ubuntu-latest"
        timeout-minutes: 5
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
              with:
                  persist-credentials: false

            - name: "Run ShellCheck"
              uses: "ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38" # 2.0.0
              with:
                  scandir: "packages/tooling/vis/scripts"
                  severity: "warning"
                  format: "gcc"

    psscriptanalyzer:
        name: "PSScriptAnalyzer (install.ps1)"
        if: "github.repository == 'visulima/visulima'"
        runs-on: "ubuntu-latest"
        timeout-minutes: 5
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
              with:
                  persist-credentials: false

            - name: "Run PSScriptAnalyzer"
              shell: "pwsh"
              run: |
                  Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
                  Install-Module -Name PSScriptAnalyzer -RequiredVersion 1.25.0 -Scope CurrentUser -Force
                  $results = Invoke-ScriptAnalyzer `
                      -Path "packages/tooling/vis/scripts/install.ps1" `
                      -Severity @('Warning', 'Error') `
                      -ExcludeRule 'PSAvoidUsingInvokeExpression'
                  if ($results) {
                      $results | Format-Table -AutoSize | Out-String | Write-Host
                      Write-Host "::error::PSScriptAnalyzer reported $($results.Count) issue(s) in install.ps1"
                      exit 1
                  }
                  Write-Host "PSScriptAnalyzer: no Warning/Error findings in install.ps1"
