# https://help.github.com/en/categories/automating-your-workflow-with-github-actions

name: "Semantic Release"

on: # yamllint disable-line rule:truthy
    push:
        branches:
            - "([0-9])?(.{+([0-9]),x}).x"
            - "main"
            - "next"
            - "next-major"
            - "alpha"
            - "beta"
    workflow_dispatch: # yamllint disable-line rule:empty-values

concurrency:
    group: "${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true

permissions:
    contents: "read" # for checkout

jobs:
    semantic-release:
        name: "Semantic Release"
        if: "github.repository == 'visulima/visulima'"
        runs-on: "ubuntu-latest"
        permissions:
            contents: "write" # to be able to publish a GitHub release
            issues: "write" # to be able to comment on released issues
            pull-requests: "write" # to be able to comment on released pull requests
            id-token: "write" # to enable use of OIDC for npm provenance

        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450" # v2.19.1
              with:
                  egress-policy: "audit"

            - name: "Wait for tests to succeed"
              uses: "lewagon/wait-on-check-action@9312864dfbc9fd208e9c0417843430751c042800" # v1.7.0
              timeout-minutes: 30
              with:
                  ref: "${{ github.event.pull_request.head.sha || github.sha }}"
                  repo-token: "${{ secrets.GITHUB_TOKEN }}"
                  wait-interval: 30 # seconds
                  running-workflow-name: "Semantic Release" # wait for all other checks to complete
                  allowed-conclusions: "success,skipped,neutral" # all other checks must pass, being skipped or cancelled is not sufficient
                  ignore-checks: "lock-closed / lock-closed, Socket Security: Pull Request Alerts, Dependabot, Discover affected benches, Bench: boxen-bench, Bench: cerebro-bench, Bench: colorize-bench, Bench: command-line-args-bench, Bench: deep-clone-bench, Bench: fmt-bench, Bench: fs-bench, Bench: inspector-bench, Bench: pail-bench, Bench: redact-bench, Bench: string-bench, Bench: tabular-bench, Bench: task-runner-bench, Bench: tui-bench"

            # Persist credentials so multi-semantic-release can push tags/commits with
            # the explicitly-passed SEMANTIC_RELEASE_GITHUB_TOKEN.
            - name: "Git checkout" # zizmor: ignore[artipacked]
              uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
              with:
                  fetch-depth: 0
                  token: "${{ secrets.SEMANTIC_RELEASE_GITHUB_TOKEN }}"
              env:
                  GIT_COMMITTER_NAME: "GitHub Actions Shell"
                  GIT_AUTHOR_NAME: "GitHub Actions Shell"
                  EMAIL: "github-actions[bot]@users.noreply.github.com"

            - name: "Derive appropriate SHAs for base and head for `nx affected` commands"
              id: "setSHAs"
              uses: "nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1" # v5.0.1

            - name: "Setup resources and environment"
              id: "setup"
              uses: "anolilab/workflows/step/setup@main"
              with:
                  node-version: "22"
                  install-node-gyp: "true"
                  cache-prefix: "semantic-release"
                  # TODO: re-enable once pnpm/npm audit works with unpublished @visulima/task-runner-binding-* packages and pnpm registry config
                  run-signatures-audit: false
                  run-npm-audit: false

            - name: "Download native build artifacts"
              uses: "dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151" # v21
              with:
                  workflow: "build-native.yml"
                  commit: "${{ github.sha }}"
                  name: "bindings-(.+)"
                  name_is_regexp: true
                  path: "artifacts"
                  if_no_artifact_found: "fail"
                  allow_forks: false

            - name: "Download NAPI loader artifacts"
              uses: "dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151" # v21
              with:
                  workflow: "build-native.yml"
                  commit: "${{ github.sha }}"
                  name: "loader-(.+)"
                  name_is_regexp: true
                  path: "artifacts"
                  if_no_artifact_found: "fail"
                  allow_forks: false

            - name: "Distribute native artifacts to platform packages"
              shell: "bash"
              run: |
                  # Loaders: overwrite committed index.js / index.d.ts with the
                  # ones napi build emitted for this commit. Guarantees the published
                  # types match the Rust signatures of the .node binaries below.
                  # The version string baked into index.js is patched to nextRelease.version
                  # later by scripts/semantic-release-native-addons.mjs.
                  cp artifacts/loader-task-runner/index.js packages/tooling/task-runner/index.js
                  cp artifacts/loader-task-runner/index.d.ts packages/tooling/task-runner/index.d.ts
                  cp artifacts/loader-tui/index.js packages/terminal/tui/index.js
                  cp artifacts/loader-tui/index.d.ts packages/terminal/tui/index.d.ts
                  cp artifacts/loader-vis/index.js packages/tooling/vis/index.js
                  cp artifacts/loader-vis/index.d.ts packages/tooling/vis/index.d.ts
                  cp artifacts/loader-secret-scanner/index.js packages/tooling/secret-scanner/index.js
                  cp artifacts/loader-secret-scanner/index.d.ts packages/tooling/secret-scanner/index.d.ts

                  # task-runner: move matching .node files and distribute to npm packages
                  find artifacts -name "task-runner-native.*.node" -exec mv {} packages/tooling/task-runner/ \;
                  cd packages/tooling/task-runner && pnpm exec napi artifacts --output-dir . --npm-dir npm && rm -f *.node && cd ../../..

                  # tui: move matching .node files and distribute to npm packages
                  find artifacts -name "tui-native.*.node" -exec mv {} packages/terminal/tui/ \;
                  cd packages/terminal/tui && pnpm exec napi artifacts --output-dir . --npm-dir npm && rm -f *.node && cd ../../..

                  # vis: move matching .node files and distribute to npm packages
                  find artifacts -name "vis-native.*.node" -exec mv {} packages/tooling/vis/ \;
                  cd packages/tooling/vis && pnpm exec napi artifacts --output-dir . --npm-dir npm && rm -f *.node && cd ../../..

                  # secret-scanner: move matching .node files and distribute to npm packages
                  find artifacts -name "secret-scanner-native.*.node" -exec mv {} packages/tooling/secret-scanner/ \;
                  cd packages/tooling/secret-scanner && pnpm exec napi artifacts --output-dir . --npm-dir npm && rm -f *.node && cd ../../..

                  rm -rf artifacts/

            - name: "Build Production"
              run: "pnpm run build:packages:prod"

            - name: "test and coverage"
              run: "pnpm run test:affected:coverage"
              env:
                  # This is needed for the colorize integration test
                  TEST_PROD_BUILD: "true"

            # Inlined replacement for `anolilab/workflows/step/codecov@main`.
            # Upstream discovers projects via `pnpm nx show projects --projects "packages/*"`,
            # which (a) returns nothing here because our packages live at
            # `packages/<category>/<name>/`, and (b) leaks pnpm platform-mismatch
            # warnings (one per NAPI subpackage) into the captured array, so a
            # warning line becomes a fake "project" and codecov fails with
            # `--fail-on-error` against a path that doesn't exist.
            - name: "Download and verify Codecov CLI"
              shell: "bash"
              run: |
                  curl -Os https://cli.codecov.io/latest/linux/codecov
                  curl -Os https://cli.codecov.io/latest/linux/codecov.SHA256SUM
                  curl -Os https://cli.codecov.io/latest/linux/codecov.SHA256SUM.sig
                  curl https://keybase.io/codecovsecurity/pgp_keys.asc | gpg --no-default-keyring --keyring trustedkeys.gpg --import
                  gpgv codecov.SHA256SUM.sig codecov.SHA256SUM
                  shasum -a 256 -c codecov.SHA256SUM
                  sudo chmod +x codecov

            - name: "Upload code coverage to codecov"
              shell: "bash"
              env:
                  CODECOV_TOKEN: "${{ secrets.CODECOV_TOKEN }}"
                  RUN_ID: "${{ github.run_id }}"
              run: |
                  shopt -s nullglob
                  uploaded=0
                  for cov_dir in packages/*/*/coverage; do
                      pkg_dir="$(dirname "$cov_dir")"
                      project="$(basename "$pkg_dir")"
                      echo "Running codecov in ${pkg_dir}"
                      ./codecov --codecov-yml-path codecov.yml --verbose upload-process --fail-on-error \
                          --dir "$pkg_dir" -t "$CODECOV_TOKEN" -F "$project" -n "${project}-${RUN_ID}"
                      uploaded=$((uploaded + 1))
                  done
                  echo "Codecov uploads completed: ${uploaded}"

            - name: "Semantic Release"
              if: "success()"
              env:
                  GITHUB_TOKEN: "${{ secrets.SEMANTIC_RELEASE_GITHUB_TOKEN }}"
                  NPM_TOKEN: "${{ secrets.NPM_AUTH_TOKEN }}"
                  GIT_AUTHOR_NAME: "github-actions-shell"
                  GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"
                  GIT_COMMITTER_NAME: "github-actions-shell"
                  GIT_COMMITTER_EMAIL: "github-actions[bot]@users.noreply.github.com"
              run: "pnpm exec multi-semantic-release --ignore-packages='packages/tooling/task-runner/npm/**,packages/terminal/tui/npm/**,packages/tooling/vis/npm/**,packages/tooling/secret-scanner/npm/**'"

            # multi-semantic-release pushes per-package `chore(release)` commits that
            # bump each package.json (and any cross-package dependency ranges), but
            # @semantic-release/git only stages per-package assets — pnpm-lock.yaml
            # lives at the root and drifts. Frozen-lockfile installs on the next push
            # then fail with ERR_PNPM_OUTDATED_LOCKFILE. Refresh + commit here.
            - name: "Sync pnpm-lock.yaml with released manifests"
              if: "success()"
              shell: "bash"
              env:
                  GIT_AUTHOR_NAME: "github-actions-shell"
                  GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"
                  GIT_COMMITTER_NAME: "github-actions-shell"
                  GIT_COMMITTER_EMAIL: "github-actions[bot]@users.noreply.github.com"
              run: |
                  pnpm install --lockfile-only --no-frozen-lockfile
                  if git diff --quiet -- pnpm-lock.yaml; then
                      echo "pnpm-lock.yaml already in sync — nothing to commit."
                      exit 0
                  fi
                  git add pnpm-lock.yaml
                  git commit -m "chore(deps): sync pnpm-lock.yaml with released manifests [skip ci]"
                  git push origin HEAD:"${GITHUB_REF#refs/heads/}"
