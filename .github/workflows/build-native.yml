# https://help.github.com/en/categories/automating-your-workflow-with-github-actions

name: "Build Native"

on: # yamllint disable-line rule:truthy
    # eslint-disable-next-line yml/no-empty-mapping-value
    pull_request: # yamllint disable-line rule:empty-values
    push:
        branches:
            - "main"
            - "next"
            - "alpha"
            - "beta"
    workflow_dispatch: # yamllint disable-line rule:empty-values

concurrency:
    group: "${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true

permissions:
    contents: "read"

env:
    CARGO_INCREMENTAL: 0

jobs:
    files-changed:
        name: "Detect native file changes"
        runs-on: "ubuntu-24.04"
        timeout-minutes: 3
        outputs:
            task-runner: "${{ steps.changes.outputs.task-runner }}"
            tui: "${{ steps.changes.outputs.tui }}"
            vis: "${{ steps.changes.outputs.vis }}"
            secret-scanner: "${{ steps.changes.outputs.secret-scanner }}"
            any-changed: "${{ steps.changes.outputs.task-runner == 'true' || steps.changes.outputs.tui == 'true' || steps.changes.outputs.vis == 'true' || steps.changes.outputs.secret-scanner == 'true' }}"
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594" # v2.16.0
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1
              with:
                  persist-credentials: false

            - name: "Check for native file changes"
              uses: "dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36" # v3.0.2
              id: "changes"
              with:
                  filters: |
                      task-runner:
                        - 'packages/tooling/task-runner/native/**'
                        - 'packages/tooling/task-runner/npm/**'
                        - 'packages/tooling/task-runner/package.json'
                        - 'packages/tooling/task-runner/index.js'
                        - '.github/workflows/build-native.yml'
                      tui:
                        - 'packages/terminal/tui/native/**'
                        - 'packages/terminal/tui/npm/**'
                        - 'packages/terminal/tui/package.json'
                        - 'packages/terminal/tui/index.js'
                        - '.github/workflows/build-native.yml'
                      vis:
                        - 'packages/tooling/vis/native/**'
                        - 'packages/tooling/vis/npm/**'
                        - 'packages/tooling/vis/package.json'
                        - 'packages/tooling/vis/index.js'
                        - '.github/workflows/build-native.yml'
                      secret-scanner:
                        - 'packages/tooling/secret-scanner/native/**'
                        - 'packages/tooling/secret-scanner/npm/**'
                        - 'packages/tooling/secret-scanner/package.json'
                        - 'packages/tooling/secret-scanner/index.js'
                        - '.github/workflows/build-native.yml'

    # Build all changed packages per target, test inline on native-runnable targets.
    # Always runs so that test.yml can download artifacts for every PR — caches
    # prevent recompilation when native sources are unchanged.
    build:
        name: "Build native - ${{ matrix.settings.target }}"
        needs: "files-changed"
        strategy:
            fail-fast: false
            matrix:
                settings:
                    - target: "x86_64-apple-darwin"
                      os: "macos-latest"
                    - target: "aarch64-apple-darwin"
                      os: "macos-latest"
                      testable: true
                    - target: "x86_64-unknown-linux-gnu"
                      os: "ubuntu-latest"
                      testable: true
                    - target: "x86_64-unknown-linux-musl"
                      os: "ubuntu-latest"
                      cross: "-x"
                    - target: "aarch64-unknown-linux-gnu"
                      os: "ubuntu-latest"
                      cross: "--use-napi-cross"
                    - target: "aarch64-unknown-linux-musl"
                      os: "ubuntu-latest"
                      cross: "-x"
                    - target: "x86_64-pc-windows-msvc"
                      os: "windows-latest"
                      testable: true
                    - target: "aarch64-pc-windows-msvc"
                      os: "windows-latest"
        runs-on: "${{ matrix.settings.os }}"

        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594" # v2.16.0
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1
              with:
                  persist-credentials: false

            # --- Cache per package ---
            # Caches always restore (keyed by source hash) so test.yml can download
            # the resulting artifacts even for PRs that don't touch native sources.
            - name: "Cache task-runner native build"
              id: "cache-task-runner"
              uses: "actions/cache@5a3ec84eff668545956fd18022155c47e93e2684" # v4.2.3
              with:
                  path: "packages/tooling/task-runner/*.node"
                  key: "native-task-runner-${{ matrix.settings.target }}-zig0.14.1-${{ hashFiles('rust-toolchain.toml', 'packages/tooling/task-runner/native/Cargo.toml', 'packages/tooling/task-runner/native/Cargo.lock', 'packages/tooling/task-runner/native/build.rs', 'packages/tooling/task-runner/native/src/**') }}"

            - name: "Cache tui native build"
              id: "cache-tui"
              uses: "actions/cache@5a3ec84eff668545956fd18022155c47e93e2684" # v4.2.3
              with:
                  path: "packages/terminal/tui/*.node"
                  key: "native-tui-${{ matrix.settings.target }}-zig0.14.1-${{ hashFiles('rust-toolchain.toml', 'packages/terminal/tui/native/Cargo.toml', 'packages/terminal/tui/native/Cargo.lock', 'packages/terminal/tui/native/build.rs', 'packages/terminal/tui/native/src/**') }}"

            - name: "Cache vis native build"
              id: "cache-vis"
              uses: "actions/cache@5a3ec84eff668545956fd18022155c47e93e2684" # v4.2.3
              with:
                  path: "packages/tooling/vis/*.node"
                  key: "native-vis-${{ matrix.settings.target }}-zig0.14.1-${{ hashFiles('rust-toolchain.toml', 'packages/tooling/vis/native/Cargo.toml', 'packages/tooling/vis/native/Cargo.lock', 'packages/tooling/vis/native/build.rs', 'packages/tooling/vis/native/src/**') }}"

            - name: "Cache secret-scanner native build"
              id: "cache-secret-scanner"
              uses: "actions/cache@5a3ec84eff668545956fd18022155c47e93e2684" # v4.2.3
              with:
                  path: "packages/tooling/secret-scanner/*.node"
                  key: "native-secret-scanner-${{ matrix.settings.target }}-zig0.14.1-${{ hashFiles('rust-toolchain.toml', 'packages/tooling/secret-scanner/native/Cargo.toml', 'packages/tooling/secret-scanner/native/Cargo.lock', 'packages/tooling/secret-scanner/native/build.rs', 'packages/tooling/secret-scanner/native/src/**') }}"

            # Determine if any package actually needs building (not all cached)
            # A skipped cache step (package unchanged) has outcome='skipped' and empty cache-hit,
            # so we must check both that the cache step ran AND missed.
            - name: "Check if build is needed"
              id: "need-build"
              shell: "bash"
              run: |
                  NEED="false"
                  if [[ "${{ steps.cache-task-runner.outcome }}" == "success" && "${{ steps.cache-task-runner.outputs.cache-hit }}" != "true" ]]; then
                    NEED="true"
                  fi
                  if [[ "${{ steps.cache-tui.outcome }}" == "success" && "${{ steps.cache-tui.outputs.cache-hit }}" != "true" ]]; then
                    NEED="true"
                  fi
                  if [[ "${{ steps.cache-vis.outcome }}" == "success" && "${{ steps.cache-vis.outputs.cache-hit }}" != "true" ]]; then
                    NEED="true"
                  fi
                  if [[ "${{ steps.cache-secret-scanner.outcome }}" == "success" && "${{ steps.cache-secret-scanner.outputs.cache-hit }}" != "true" ]]; then
                    NEED="true"
                  fi
                  echo "any=$NEED" >> "$GITHUB_OUTPUT"

            # Setup Node.js/pnpm — needed for building AND for running vitest on testable targets
            - name: "Setup resources and environment"
              if: "steps.need-build.outputs.any == 'true' || matrix.settings.testable"
              id: "setup"
              uses: "anolilab/workflows/step/setup@c7103f1bfdb14c19596c4f80156c824951bfc117" # main
              with:
                  node-version: "22"
                  cache-prefix: "build-native"
                  # TODO: re-enable once pnpm/npm audit works with unpublished @visulima/task-runner-binding-* packages and pnpm registry config
                  run-signatures-audit: false
                  run-npm-audit: false

            - name: "Install Rust toolchain"
              if: "steps.need-build.outputs.any == 'true'"
              uses: "oxc-project/setup-rust@23f38cfb0c04af97a055f76acee94d5be71c7c82" # v1.0.16
              with:
                  cache-key: "build-native"
                  save-cache: "${{ github.ref_name == 'main' }}"
                  tools: "${{ matrix.settings.cross == '-x' && 'cargo-zigbuild' || '' }}"

            - name: "Add Rust target"
              if: "steps.need-build.outputs.any == 'true'"
              run: "rustup target add ${{ matrix.settings.target }}"

            - name: "Install Zig (cross-compilation)"
              if: "steps.need-build.outputs.any == 'true' && matrix.settings.cross == '-x'"
              uses: "mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29" # v2.2.1
              with:
                  version: "0.14.1"

            # --- Build each package when cache missed ---
            # Cache keys are derived from native sources, so cache hits short-circuit
            # unchanged packages. Removing the files-changed gate ensures that PRs
            # whose diff misses native sources still produce artifacts for test.yml.
            - name: "Build task-runner native"
              if: "steps.cache-task-runner.outputs.cache-hit != 'true'"
              run: "pnpm build:native --target ${{ matrix.settings.target }} ${{ matrix.settings.cross || '' }}"
              working-directory: "packages/tooling/task-runner"

            - name: "Build tui native"
              if: "steps.cache-tui.outputs.cache-hit != 'true'"
              run: "pnpm build:native --target ${{ matrix.settings.target }} ${{ matrix.settings.cross || '' }}"
              working-directory: "packages/terminal/tui"

            - name: "Build vis native"
              if: "steps.cache-vis.outputs.cache-hit != 'true'"
              run: "pnpm build:native --target ${{ matrix.settings.target }} ${{ matrix.settings.cross || '' }}"
              working-directory: "packages/tooling/vis"

            - name: "Build secret-scanner native"
              if: "steps.cache-secret-scanner.outputs.cache-hit != 'true'"
              run: "pnpm build:native --target ${{ matrix.settings.target }} ${{ matrix.settings.cross || '' }}"
              working-directory: "packages/tooling/secret-scanner"

            # --- Upload artifacts per package ---
            - name: "Upload task-runner artifact"
              uses: "actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02" # v4.6.2
              with:
                  name: "bindings-task-runner-${{ matrix.settings.target }}"
                  path: "packages/tooling/task-runner/*.node"
                  if-no-files-found: "error"

            - name: "Upload tui artifact"
              uses: "actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02" # v4.6.2
              with:
                  name: "bindings-tui-${{ matrix.settings.target }}"
                  path: "packages/terminal/tui/*.node"
                  if-no-files-found: "error"

            - name: "Upload vis artifact"
              uses: "actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02" # v4.6.2
              with:
                  name: "bindings-vis-${{ matrix.settings.target }}"
                  path: "packages/tooling/vis/*.node"
                  if-no-files-found: "error"

            - name: "Upload secret-scanner artifact"
              uses: "actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02" # v4.6.2
              with:
                  name: "bindings-secret-scanner-${{ matrix.settings.target }}"
                  path: "packages/tooling/secret-scanner/*.node"
                  if-no-files-found: "error"

            # --- Test native bindings inline (only on targets that can run natively) ---
            - name: "Test task-runner native binding"
              if: "matrix.settings.testable && (github.event_name != 'pull_request' || needs.files-changed.outputs.task-runner == 'true')"
              run: "pnpm vitest run __tests__/native-binding.test.ts"
              working-directory: "packages/tooling/task-runner"

            - name: "Test tui native binding"
              if: "matrix.settings.testable && (github.event_name != 'pull_request' || needs.files-changed.outputs.tui == 'true')"
              run: "pnpm vitest run __tests__/native-binding.test.ts"
              working-directory: "packages/terminal/tui"

            - name: "Test vis native binding"
              if: "matrix.settings.testable && (github.event_name != 'pull_request' || needs.files-changed.outputs.vis == 'true')"
              run: "pnpm vitest run __tests__/native-binding.test.ts"
              working-directory: "packages/tooling/vis"

            - name: "Build secret-scanner JS dependencies (fs, path)"
              if: "matrix.settings.testable && (github.event_name != 'pull_request' || needs.files-changed.outputs.secret-scanner == 'true')"
              run: "pnpm exec nx run-many --target=build --projects=fs,path"

            - name: "Test secret-scanner native binding"
              if: "matrix.settings.testable && (github.event_name != 'pull_request' || needs.files-changed.outputs.secret-scanner == 'true')"
              run: "pnpm vitest run __tests__/native-binding.test.ts"
              working-directory: "packages/tooling/secret-scanner"

    # This check runs once all build jobs have passed
    build-native-required-check:
        needs: ["files-changed", "build"]
        name: "Check Native Build"
        if: "always()"
        runs-on: "ubuntu-24.04"
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594" # v2.16.0
              with:
                  egress-policy: "audit"

            - name: "Check for failures"
              run: |
                  if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
                    echo "One of the dependent jobs have failed. You may need to re-run it." && exit 1
                  fi
