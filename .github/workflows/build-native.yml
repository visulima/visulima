# https://help.github.com/en/categories/automating-your-workflow-with-github-actions

name: "Build Native"

on: # yamllint disable-line rule:truthy
    pull_request:
        branches:
            - "main"
            - "next"
            - "alpha"
            - "beta"
    push:
        branches:
            - "main"
            - "next"
            - "alpha"
            - "beta"
    workflow_dispatch: # yamllint disable-line rule:empty-values

concurrency:
    group: "${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true

permissions:
    contents: "read"

env:
    CARGO_INCREMENTAL: 0

jobs:
    files-changed:
        name: "Detect native file changes"
        runs-on: "ubuntu-24.04"
        timeout-minutes: 3
        outputs:
            task-runner: "${{ steps.changes.outputs.task-runner }}"
            tui: "${{ steps.changes.outputs.tui }}"
            vis: "${{ steps.changes.outputs.vis }}"
            secret-scanner: "${{ steps.changes.outputs.secret-scanner }}"
            any-changed: "${{ steps.changes.outputs.task-runner == 'true' || steps.changes.outputs.tui == 'true' || steps.changes.outputs.vis == 'true' || steps.changes.outputs.secret-scanner == 'true' }}"
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            # `secrets.GITHUB_TOKEN` returns transient HTTP 401 mid-checkout;
            # wrap with a two-shot retry (same pattern as cargo-test.yml).
            - name: "Git checkout"
              id: "checkout"
              continue-on-error: true
              uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
              with:
                  persist-credentials: false

            - name: "Wait before retrying checkout"
              if: "steps.checkout.outcome == 'failure'"
              shell: "bash"
              run: "sleep 15"

            - name: "Git checkout (retry)"
              if: "steps.checkout.outcome == 'failure'"
              uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
              with:
                  persist-credentials: false

            - name: "Check for native file changes"
              uses: "dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d" # v4.0.1
              id: "changes"
              with:
                  filters: |
                      task-runner:
                        - 'packages/tooling/task-runner/native/**'
                        - 'packages/tooling/task-runner/npm/**'
                        - 'packages/tooling/task-runner/package.json'
                        - 'packages/tooling/task-runner/index.js'
                        - '.github/workflows/build-native.yml'
                      tui:
                        - 'packages/terminal/tui/native/**'
                        - 'packages/terminal/tui/npm/**'
                        - 'packages/terminal/tui/package.json'
                        - 'packages/terminal/tui/index.js'
                        - '.github/workflows/build-native.yml'
                      vis:
                        - 'packages/tooling/vis/native/**'
                        - 'packages/tooling/vis/npm/**'
                        - 'packages/tooling/vis/package.json'
                        - 'packages/tooling/vis/index.js'
                        - '.github/workflows/build-native.yml'
                      secret-scanner:
                        - 'packages/tooling/secret-scanner/native/**'
                        - 'packages/tooling/secret-scanner/npm/**'
                        - 'packages/tooling/secret-scanner/package.json'
                        - 'packages/tooling/secret-scanner/index.js'
                        - '.github/workflows/build-native.yml'

    # Build all changed packages per target, test inline on native-runnable targets.
    # Always runs so that test.yml can download artifacts for every PR — caches
    # prevent recompilation when native sources are unchanged.
    build:
        name: "Build native - ${{ matrix.settings.target }}"
        needs: "files-changed"
        timeout-minutes: 60
        strategy:
            fail-fast: false
            matrix:
                settings:
                    - target: "x86_64-apple-darwin"
                      os: "macos-latest"
                    - target: "aarch64-apple-darwin"
                      os: "macos-latest"
                      testable: true
                    - target: "x86_64-unknown-linux-gnu"
                      os: "ubuntu-latest"
                      testable: true
                    - target: "x86_64-unknown-linux-musl"
                      os: "ubuntu-latest"
                      cross: "-x"
                    - target: "aarch64-unknown-linux-gnu"
                      os: "ubuntu-latest"
                      cross: "--use-napi-cross"
                    - target: "aarch64-unknown-linux-musl"
                      os: "ubuntu-latest"
                      cross: "-x"
                    - target: "x86_64-pc-windows-msvc"
                      os: "windows-latest"
                      testable: true
                    - target: "aarch64-pc-windows-msvc"
                      os: "windows-latest"
        runs-on: "${{ matrix.settings.os }}"

        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            # `secrets.GITHUB_TOKEN` returns transient HTTP 401 mid-checkout;
            # wrap with a two-shot retry (same pattern as cargo-test.yml).
            - name: "Git checkout"
              id: "checkout"
              continue-on-error: true
              uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
              with:
                  persist-credentials: false

            - name: "Wait before retrying checkout"
              if: "steps.checkout.outcome == 'failure'"
              shell: "bash"
              run: "sleep 15"

            - name: "Git checkout (retry)"
              if: "steps.checkout.outcome == 'failure'"
              uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
              with:
                  persist-credentials: false

            # --- Cache per package ---
            # Caches always restore (keyed by source hash) so test.yml can download
            # the resulting artifacts even for PRs that don't touch native sources.
            - name: "Restore task-runner native build cache"
              id: "cache-task-runner"
              uses: "actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
              with:
                  path: |
                      packages/tooling/task-runner/*.node
                      packages/tooling/task-runner/npm/linux-*/fspy-seccomp-helper
                  key: "native-task-runner-${{ matrix.settings.target }}-zig0.14.1-${{ hashFiles('rust-toolchain.toml', 'packages/tooling/task-runner/native/Cargo.toml', 'packages/tooling/task-runner/native/Cargo.lock', 'packages/tooling/task-runner/native/build.rs', 'packages/tooling/task-runner/native/src/**', 'packages/tooling/task-runner/native/fspy_seccomp/Cargo.toml', 'packages/tooling/task-runner/native/fspy_seccomp/Cargo.lock', 'packages/tooling/task-runner/native/fspy_seccomp/src/**') }}"

            - name: "Restore tui native build cache"
              id: "cache-tui"
              uses: "actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
              with:
                  path: "packages/terminal/tui/*.node"
                  key: "native-tui-${{ matrix.settings.target }}-zig0.14.1-${{ hashFiles('rust-toolchain.toml', 'packages/terminal/tui/native/Cargo.toml', 'packages/terminal/tui/native/Cargo.lock', 'packages/terminal/tui/native/build.rs', 'packages/terminal/tui/native/src/**') }}"

            - name: "Restore vis native build cache"
              id: "cache-vis"
              uses: "actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
              with:
                  path: "packages/tooling/vis/*.node"
                  key: "native-vis-${{ matrix.settings.target }}-zig0.14.1-${{ hashFiles('rust-toolchain.toml', 'packages/tooling/vis/native/Cargo.toml', 'packages/tooling/vis/native/Cargo.lock', 'packages/tooling/vis/native/build.rs', 'packages/tooling/vis/native/src/**') }}"

            - name: "Restore secret-scanner native build cache"
              id: "cache-secret-scanner"
              uses: "actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
              with:
                  path: "packages/tooling/secret-scanner/*.node"
                  key: "native-secret-scanner-${{ matrix.settings.target }}-zig0.14.1-${{ hashFiles('rust-toolchain.toml', 'packages/tooling/secret-scanner/native/Cargo.toml', 'packages/tooling/secret-scanner/native/Cargo.lock', 'packages/tooling/secret-scanner/native/build.rs', 'packages/tooling/secret-scanner/native/src/**') }}"

            # Determine if any package actually needs building (not all cached)
            # A skipped cache step (package unchanged) has outcome='skipped' and empty cache-hit,
            # so we must check both that the cache step ran AND missed.
            - name: "Check if build is needed"
              id: "need-build"
              shell: "bash"
              run: |
                  NEED="false"
                  if [[ "${{ steps.cache-task-runner.outcome }}" == "success" && "${{ steps.cache-task-runner.outputs.cache-hit }}" != "true" ]]; then
                    NEED="true"
                  fi
                  if [[ "${{ steps.cache-tui.outcome }}" == "success" && "${{ steps.cache-tui.outputs.cache-hit }}" != "true" ]]; then
                    NEED="true"
                  fi
                  if [[ "${{ steps.cache-vis.outcome }}" == "success" && "${{ steps.cache-vis.outputs.cache-hit }}" != "true" ]]; then
                    NEED="true"
                  fi
                  if [[ "${{ steps.cache-secret-scanner.outcome }}" == "success" && "${{ steps.cache-secret-scanner.outputs.cache-hit }}" != "true" ]]; then
                    NEED="true"
                  fi
                  echo "any=$NEED" >> "$GITHUB_OUTPUT"

            # Setup Node.js/pnpm — needed for building AND for running vitest on testable targets
            - name: "Setup resources and environment"
              if: "steps.need-build.outputs.any == 'true' || (matrix.settings.testable && needs.files-changed.outputs.any-changed == 'true')"
              id: "setup"
              uses: "anolilab/workflows/step/node@3c54b71af67bdd990513c4a17fa2fde078db7b74" # main
              with:
                  node-version: "22"
                  cache-prefix: "build-native"
                  # TODO: re-enable once pnpm/npm audit works with unpublished @visulima/task-runner-binding-* packages and pnpm registry config
                  run-signatures-audit: false
                  run-npm-audit: false

            - name: "Install Rust toolchain"
              if: "steps.need-build.outputs.any == 'true'"
              uses: "anolilab/workflows/step/rust@3c54b71af67bdd990513c4a17fa2fde078db7b74" # main
              with:
                  cache-key: "build-native"
                  save-cache: "${{ github.ref_name == 'main' }}"
                  targets: "${{ matrix.settings.target }}"
                  tools: "${{ matrix.settings.cross == '-x' && 'cargo-zigbuild' || '' }}"
                  workspaces: |
                      packages/tooling/task-runner/native
                      packages/terminal/tui/native
                      packages/tooling/vis/native
                      packages/tooling/secret-scanner/native

            - name: "Install Zig (cross-compilation)"
              if: "steps.need-build.outputs.any == 'true' && matrix.settings.cross == '-x'"
              uses: "mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29" # v2.2.1
              with:
                  version: "0.14.1"

            # cargo-zigbuild for the fspy-seccomp-helper build step.
            # napi-cli bundles its own zigbuild for the .node addon,
            # but the helper bin uses `cargo zigbuild` directly so it
            # needs the standalone subcommand. Prebuilt via
            # taiki-e/install-action (~5s; building via `cargo install`
            # would add multiple minutes per CI run).
            - name: "Install cargo-zigbuild (Linux only)"
              if: "contains(matrix.settings.target, 'linux')"
              uses: "taiki-e/install-action@e49978b799e49ff429d162b7a30601a569ab6538" # v2
              with:
                  tool: "cargo-zigbuild"

            # --- Build each package when cache missed ---
            # Cache keys are derived from native sources, so cache hits short-circuit
            # unchanged packages. Removing the files-changed gate ensures that PRs
            # whose diff misses native sources still produce artifacts for test.yml.
            - name: "Build task-runner native"
              if: "steps.cache-task-runner.outputs.cache-hit != 'true'"
              run: "pnpm build:native --target ${{ matrix.settings.target }} ${{ matrix.settings.cross || '' }}"
              working-directory: "packages/tooling/task-runner"

            # Build the fspy-seccomp-helper sidecar binary for every
            # Linux target. Pure-Rust seccomp (no libseccomp dep), so
            # cargo-zigbuild can cross-compile all four triples without
            # extra sysroot setup. Each output drops into the matching
            # binding package so its `files` array publishes it.
            - name: "Build fspy-seccomp-helper (all Linux)"
              if: "contains(matrix.settings.target, 'linux')"
              shell: "bash"
              working-directory: "packages/tooling/task-runner"
              env:
                  TARGET: "${{ matrix.settings.target }}"
              run: |
                  rustup target add "$TARGET"
                  cargo zigbuild \
                      --manifest-path native/fspy_seccomp/Cargo.toml \
                      --bin fspy-seccomp-helper \
                      --release \
                      --target "$TARGET"
                  case "$TARGET" in
                    x86_64-unknown-linux-gnu)    binding="linux-x64-gnu" ;;
                    x86_64-unknown-linux-musl)   binding="linux-x64-musl" ;;
                    aarch64-unknown-linux-gnu)   binding="linux-arm64-gnu" ;;
                    aarch64-unknown-linux-musl)  binding="linux-arm64-musl" ;;
                    *)                           binding="" ;;
                  esac
                  if [ -n "$binding" ]; then
                      install -m 0755 \
                          "native/fspy_seccomp/target/$TARGET/release/fspy-seccomp-helper" \
                          "npm/$binding/fspy-seccomp-helper"
                  fi

            - name: "Build tui native"
              if: "steps.cache-tui.outputs.cache-hit != 'true'"
              run: "pnpm build:native --target ${{ matrix.settings.target }} ${{ matrix.settings.cross || '' }}"
              working-directory: "packages/terminal/tui"

            - name: "Build vis native"
              if: "steps.cache-vis.outputs.cache-hit != 'true'"
              run: "pnpm build:native --target ${{ matrix.settings.target }} ${{ matrix.settings.cross || '' }}"
              working-directory: "packages/tooling/vis"

            - name: "Build secret-scanner native"
              if: "steps.cache-secret-scanner.outputs.cache-hit != 'true'"
              run: "pnpm build:native --target ${{ matrix.settings.target }} ${{ matrix.settings.cross || '' }}"
              working-directory: "packages/tooling/secret-scanner"

            # --- Save build artifacts back to cache (trusted refs only) ---
            # PRs (including forks) restore but never write — a fork build can't
            # poison the cache for the next main run that pulls under the same key.
            - name: "Save task-runner native build cache"
              if: "github.event_name == 'push' && steps.cache-task-runner.outputs.cache-hit != 'true'"
              uses: "actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
              with:
                  path: |
                      packages/tooling/task-runner/*.node
                      packages/tooling/task-runner/npm/linux-*/fspy-seccomp-helper
                  key: "${{ steps.cache-task-runner.outputs.cache-primary-key }}"

            - name: "Save tui native build cache"
              if: "github.event_name == 'push' && steps.cache-tui.outputs.cache-hit != 'true'"
              uses: "actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
              with:
                  path: "packages/terminal/tui/*.node"
                  key: "${{ steps.cache-tui.outputs.cache-primary-key }}"

            - name: "Save vis native build cache"
              if: "github.event_name == 'push' && steps.cache-vis.outputs.cache-hit != 'true'"
              uses: "actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
              with:
                  path: "packages/tooling/vis/*.node"
                  key: "${{ steps.cache-vis.outputs.cache-primary-key }}"

            - name: "Save secret-scanner native build cache"
              if: "github.event_name == 'push' && steps.cache-secret-scanner.outputs.cache-hit != 'true'"
              uses: "actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
              with:
                  path: "packages/tooling/secret-scanner/*.node"
                  key: "${{ steps.cache-secret-scanner.outputs.cache-primary-key }}"

            # --- Upload artifacts per package ---
            - name: "Upload task-runner artifact"
              uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7.0.1
              with:
                  name: "bindings-task-runner-${{ matrix.settings.target }}"
                  path: |
                      packages/tooling/task-runner/*.node
                      packages/tooling/task-runner/npm/linux-*/fspy-seccomp-helper
                  if-no-files-found: "error"

            - name: "Upload tui artifact"
              uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7.0.1
              with:
                  name: "bindings-tui-${{ matrix.settings.target }}"
                  path: "packages/terminal/tui/*.node"
                  if-no-files-found: "error"

            - name: "Upload vis artifact"
              uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7.0.1
              with:
                  name: "bindings-vis-${{ matrix.settings.target }}"
                  path: "packages/tooling/vis/*.node"
                  if-no-files-found: "error"

            - name: "Upload secret-scanner artifact"
              uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7.0.1
              with:
                  name: "bindings-secret-scanner-${{ matrix.settings.target }}"
                  path: "packages/tooling/secret-scanner/*.node"
                  if-no-files-found: "error"

            # --- Upload NAPI loader files (index.js, index.d.ts) once ---
            # napi build regenerates these on every runner, but the content is
            # target-agnostic (derived from Rust signatures + napi.targets). Upload
            # once from x86_64-unknown-linux-gnu so semantic-release.yml can copy
            # them into the package roots before publish — guarantees the
            # published .d.ts matches the Rust signatures of the .node binaries.
            - name: "Upload task-runner loader"
              if: "matrix.settings.target == 'x86_64-unknown-linux-gnu'"
              uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7.0.1
              with:
                  name: "loader-task-runner"
                  path: |
                      packages/tooling/task-runner/index.js
                      packages/tooling/task-runner/index.d.ts
                  if-no-files-found: "error"

            - name: "Upload tui loader"
              if: "matrix.settings.target == 'x86_64-unknown-linux-gnu'"
              uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7.0.1
              with:
                  name: "loader-tui"
                  path: |
                      packages/terminal/tui/index.js
                      packages/terminal/tui/index.d.ts
                  if-no-files-found: "error"

            - name: "Upload vis loader"
              if: "matrix.settings.target == 'x86_64-unknown-linux-gnu'"
              uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7.0.1
              with:
                  name: "loader-vis"
                  path: |
                      packages/tooling/vis/index.js
                      packages/tooling/vis/index.d.ts
                  if-no-files-found: "error"

            - name: "Upload secret-scanner loader"
              if: "matrix.settings.target == 'x86_64-unknown-linux-gnu'"
              uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7.0.1
              with:
                  name: "loader-secret-scanner"
                  path: |
                      packages/tooling/secret-scanner/index.js
                      packages/tooling/secret-scanner/index.d.ts
                  if-no-files-found: "error"

            # --- Test native bindings inline (only on targets that can run natively) ---
            - name: "Test task-runner native binding"
              if: "matrix.settings.testable && (github.event_name != 'pull_request' || needs.files-changed.outputs.task-runner == 'true')"
              run: "pnpm vitest run __tests__/unit/native-binding.test.ts"
              working-directory: "packages/tooling/task-runner"

            - name: "Test tui native binding"
              if: "matrix.settings.testable && (github.event_name != 'pull_request' || needs.files-changed.outputs.tui == 'true')"
              run: "pnpm vitest run __tests__/native-binding.test.ts"
              working-directory: "packages/terminal/tui"

            - name: "Test vis native binding"
              if: "matrix.settings.testable && (github.event_name != 'pull_request' || needs.files-changed.outputs.vis == 'true')"
              run: "pnpm vitest run __tests__/native/native-binding.test.ts"
              working-directory: "packages/tooling/vis"

            - name: "Build @visulima/path (secret-scanner dep)"
              if: "matrix.settings.testable && (github.event_name != 'pull_request' || needs.files-changed.outputs.secret-scanner == 'true')"
              run: "pnpm run build"
              working-directory: "packages/filesystem/path"

            - name: "Build @visulima/error (secret-scanner dep)"
              if: "matrix.settings.testable && (github.event_name != 'pull_request' || needs.files-changed.outputs.secret-scanner == 'true')"
              run: "pnpm run build"
              working-directory: "packages/error-debugging/error"

            - name: "Build @visulima/fs (secret-scanner dep)"
              if: "matrix.settings.testable && (github.event_name != 'pull_request' || needs.files-changed.outputs.secret-scanner == 'true')"
              run: "pnpm run build"
              working-directory: "packages/filesystem/fs"

            - name: "Test secret-scanner native binding"
              if: "matrix.settings.testable && (github.event_name != 'pull_request' || needs.files-changed.outputs.secret-scanner == 'true')"
              run: "pnpm vitest run __tests__/native-binding.test.ts"
              working-directory: "packages/tooling/secret-scanner"

    # This check runs once all build jobs have passed
    build-native-required-check:
        needs: ["files-changed", "build"]
        name: "Check Native Build"
        if: "always()"
        runs-on: "ubuntu-24.04"
        timeout-minutes: 30
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Check for failures"
              run: |
                  if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
                    echo "One of the dependent jobs have failed. You may need to re-run it." && exit 1
                  fi
