# https://help.github.com/en/categories/automating-your-workflow-with-github-actions

name: "Build Native"

on: # yamllint disable-line rule:truthy
    # eslint-disable-next-line yml/no-empty-mapping-value
    pull_request: # yamllint disable-line rule:empty-values
        paths:
            - "packages/tooling/task-runner/native/**"
            - "packages/tooling/task-runner/npm/**"
            - "packages/tooling/task-runner/package.json"
            - "packages/tooling/task-runner/binding.js"
            - ".github/workflows/build-native.yml"
    push:
        branches:
            - "main"
            - "next"
            - "alpha"
            - "beta"
    workflow_dispatch: # yamllint disable-line rule:empty-values

concurrency:
    group: "${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true

permissions:
    contents: "read"

env:
    CARGO_INCREMENTAL: 0

defaults:
    run:
        working-directory: "packages/tooling/task-runner"

jobs:
    build:
        name: "Build - ${{ matrix.settings.target }}"
        strategy:
            fail-fast: false
            matrix:
                settings:
                    - target: "x86_64-apple-darwin"
                      os: "macos-latest"
                    - target: "aarch64-apple-darwin"
                      os: "macos-latest"
                    - target: "x86_64-unknown-linux-gnu"
                      os: "ubuntu-latest"
                    - target: "x86_64-unknown-linux-musl"
                      os: "ubuntu-latest"
                      cross: "-x"
                    - target: "aarch64-unknown-linux-gnu"
                      os: "ubuntu-latest"
                      cross: "--use-napi-cross"
                    - target: "aarch64-unknown-linux-musl"
                      os: "ubuntu-latest"
                      cross: "-x"
                    - target: "x86_64-pc-windows-msvc"
                      os: "windows-latest"
                    - target: "aarch64-pc-windows-msvc"
                      os: "windows-latest"
        runs-on: "${{ matrix.settings.os }}"

        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2" # v2.13.2
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1

            - name: "Setup resources and environment"
              id: "setup"
              uses: "anolilab/workflows/step/setup@main"
              with:
                  node-version: "22"
                  cache-prefix: "build-native"
                  run-signatures-audit: false

            - name: "Install Rust toolchain"
              uses: "dtolnay/rust-toolchain@stable"
              with:
                  targets: "${{ matrix.settings.target }}"

            - name: "Rust cache"
              uses: "Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6" # v2.7.8
              with:
                  workspaces: "packages/tooling/task-runner/native -> target"

            - name: "Install Zig (Linux cross-compilation)"
              if: "${{ matrix.settings.cross }}"
              uses: "mlugg/setup-zig@v2"
              with:
                  version: "0.14.1"

            - name: "Install cargo cross-compilation tools"
              if: "${{ matrix.settings.cross }}"
              uses: "taiki-e/install-action@v2"
              with:
                  tool: "cargo-zigbuild,cargo-xwin"

            - name: "Build native"
              run: "pnpm build:native --target ${{ matrix.settings.target }} ${{ matrix.settings.cross || '' }}"

            - name: "Upload artifact"
              uses: "actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02" # v4.6.2
              with:
                  name: "bindings-${{ matrix.settings.target }}"
                  path: "packages/tooling/task-runner/*.node"
                  if-no-files-found: "error"

    test-native:
        name: "Test native - ${{ matrix.settings.target }}"
        needs: "build"
        strategy:
            fail-fast: false
            matrix:
                settings:
                    - target: "x86_64-apple-darwin"
                      os: "macos-13"
                    - target: "aarch64-apple-darwin"
                      os: "macos-latest"
                    - target: "x86_64-unknown-linux-gnu"
                      os: "ubuntu-latest"
                    - target: "x86_64-pc-windows-msvc"
                      os: "windows-latest"
        runs-on: "${{ matrix.settings.os }}"

        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2" # v2.13.2
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1

            - name: "Setup resources and environment"
              id: "setup"
              uses: "anolilab/workflows/step/setup@main"
              with:
                  node-version: "22"
                  cache-prefix: "build-native-test"
                  run-signatures-audit: false

            - name: "Download artifact"
              uses: "actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093" # v4.3.0
              with:
                  name: "bindings-${{ matrix.settings.target }}"
                  path: "packages/tooling/task-runner"

            - name: "Build TypeScript"
              run: "pnpm build"

            - name: "Run native binding tests"
              run: "pnpm vitest run __tests__/native-binding.test.ts __tests__/xxh3.test.ts"

    # This check runs once all build jobs have passed
    build-native-required-check:
        needs: ["build", "test-native"]
        name: "Check Native Build"
        if: "always()"
        runs-on: "ubuntu-24.04"
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2" # v2.13.2
              with:
                  egress-policy: "audit"

            - name: "Check for failures"
              run: |
                  if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
                    echo "One of the dependent jobs have failed. You may need to re-run it." && exit 1
                  fi
