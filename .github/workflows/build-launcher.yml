# Builds the vis Rust launcher binary for all 8 target platforms and stages each
# into its `packages/tooling/vis/launcher/npm/<suffix>/bin/` package, so the
# release can publish `@visulima/vis-launcher-<suffix>` (optionalDependencies of
# @visulima/vis). Mirrors build-native.yml's matrix/runner layout, but the launcher
# is a plain `cargo` binary (not a napi addon), so it uses cargo directly:
# native cargo on macOS/Windows runners, cargo-zigbuild for the Linux cross targets.
#
# ⚠️ DRAFT — not yet validated in CI. The cross-build toolchain (esp. linux musl /
# aarch64 via zigbuild, and aarch64-pc-windows-msvc) needs a real CI run to confirm.
# It also does NOT yet publish: the launcher npm/ packages need a publish step in
# the release (scripts/semantic-release-native-addons.mjs scans `./npm/`, which is
# the napi bindings, not `./launcher/npm/`). See rfc/design-rust-launcher.md.
name: "Build Launcher"

on: # yamllint disable-line rule:truthy
    workflow_dispatch: {}
    push:
        branches:
            - "main"
            - "alpha"
            - "beta"
            - "next"
        paths:
            - "packages/tooling/vis/launcher/**"
            - ".github/workflows/build-launcher.yml"

permissions:
    contents: "read"

jobs:
    build:
        name: "Build ${{ matrix.settings.suffix }}"
        runs-on: "${{ matrix.settings.os }}"
        strategy:
            fail-fast: false
            matrix:
                settings:
                    - target: "aarch64-apple-darwin"
                      suffix: "darwin-arm64"
                      os: "macos-latest"
                    - target: "x86_64-apple-darwin"
                      suffix: "darwin-x64"
                      os: "macos-latest"
                    - target: "x86_64-unknown-linux-gnu"
                      suffix: "linux-x64-gnu"
                      os: "ubuntu-latest"
                      zig: true
                    - target: "x86_64-unknown-linux-musl"
                      suffix: "linux-x64-musl"
                      os: "ubuntu-latest"
                      zig: true
                    - target: "aarch64-unknown-linux-gnu"
                      suffix: "linux-arm64-gnu"
                      os: "ubuntu-latest"
                      zig: true
                    - target: "aarch64-unknown-linux-musl"
                      suffix: "linux-arm64-musl"
                      os: "ubuntu-latest"
                      zig: true
                    - target: "x86_64-pc-windows-msvc"
                      suffix: "win32-x64-msvc"
                      os: "windows-latest"
                    - target: "aarch64-pc-windows-msvc"
                      suffix: "win32-arm64-msvc"
                      os: "windows-latest"

        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
              with:
                  persist-credentials: false

            - name: "Install Rust toolchain"
              uses: "dtolnay/rust-toolchain@stable"
              with:
                  targets: "${{ matrix.settings.target }}"

            - name: "Install cargo-zigbuild (Linux cross targets)"
              if: "${{ matrix.settings.zig }}"
              shell: "bash"
              run: |
                  pip install ziglang
                  cargo install --locked cargo-zigbuild

            - name: "Build launcher (zigbuild)"
              if: "${{ matrix.settings.zig }}"
              shell: "bash"
              working-directory: "packages/tooling/vis/launcher"
              run: "cargo zigbuild --release --target ${{ matrix.settings.target }}"

            - name: "Build launcher (native cargo)"
              if: "${{ !matrix.settings.zig }}"
              shell: "bash"
              working-directory: "packages/tooling/vis/launcher"
              run: "cargo build --release --target ${{ matrix.settings.target }}"

            - name: "Stage binary into the platform package"
              shell: "bash"
              working-directory: "packages/tooling/vis/launcher"
              env:
                  TARGET: "${{ matrix.settings.target }}"
                  SUFFIX: "${{ matrix.settings.suffix }}"
              run: |
                  set -euo pipefail
                  mkdir -p "npm/$SUFFIX/bin"
                  if [[ "$SUFFIX" == win32-* ]]; then
                      cp "target/$TARGET/release/vis.exe" "npm/$SUFFIX/bin/vis.exe"
                  else
                      cp "target/$TARGET/release/vis" "npm/$SUFFIX/bin/vis"
                      chmod +x "npm/$SUFFIX/bin/vis"
                  fi

            - name: "Upload launcher binary"
              uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7.0.1
              with:
                  name: "launcher-${{ matrix.settings.suffix }}"
                  path: "packages/tooling/vis/launcher/npm/${{ matrix.settings.suffix }}/bin/*"
                  if-no-files-found: "error"
