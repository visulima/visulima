name: "CodeQL"
on:
    push:
        branches: ["main", "alpha", "next", "beta"]
    pull_request:
        branches: ["main", "alpha", "next", "beta"]
    schedule:
        - cron: "0 0 * * 1"
permissions: {}
jobs:
    codeql:
        permissions:
            security-events: "write"
            actions: "read"
            contents: "read"
        uses: "anolilab/workflows/.github/workflows/codeql.yml@992a32d56bf8961a317c8d7aa5ec68af4487ae79" # v20.2.0
        with:
            languages: "[\"javascript-typescript\"]"
            branches: "[\"main\", \"alpha\", \"next\", \"beta\"]"
