name: "CodeQL"
on:
    push:
        branches: ["main", "alpha", "next", "beta"]
    pull_request:
        branches: ["main", "alpha", "next", "beta"]
    schedule:
        - cron: "0 0 * * 1"
permissions: {}
jobs:
    codeql:
        permissions:
            security-events: "write"
            actions: "read"
            contents: "read"
        uses: "anolilab/workflows/.github/workflows/codeql.yml@aa162a984a4909f412bc4dbae712def066a0a681" # v20.2.5
        with:
            languages: "[\"javascript-typescript\"]"
            branches: "[\"main\", \"alpha\", \"next\", \"beta\"]"
