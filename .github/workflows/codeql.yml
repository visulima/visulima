name: "CodeQL"
on:
    push:
        branches:
            - "main"
            - "next"
            - "next-major"
            - "alpha"
            - "beta"
            # Maintenance release branches (e.g. "1.x", "1.2.x").
            - "[0-9]*.x"
            - "[0-9]*.[0-9]*.x"
    pull_request:
        # The branches below must be a subset of the branches above
        branches:
            - "main"
            - "next"
            - "next-major"
            - "alpha"
            - "beta"
            - "[0-9]*.x"
            - "[0-9]*.[0-9]*.x"
    schedule:
        - cron: "0 0 * * 1"
permissions: {}
jobs:
    codeql:
        permissions:
            security-events: "write"
            actions: "read"
            contents: "read"
        uses: "anolilab/workflows/.github/workflows/codeql.yml@045a2d464dad0661a570c8a3c19f4b32bf9efad9" # v15.3.0+
        with:
            languages: "[\"javascript-typescript\"]"
            branches: "[\"main\", \"alpha\", \"next\", \"beta\"]"
