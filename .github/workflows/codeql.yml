name: "CodeQL"
on:
    push:
        branches: ["main", "alpha", "next", "beta"]
    pull_request:
        branches: ["main", "alpha", "next", "beta"]
    schedule:
        - cron: "0 0 * * 1"
permissions: {}
jobs:
    codeql:
        permissions:
            security-events: "write"
            actions: "read"
            contents: "read"
        uses: "anolilab/workflows/.github/workflows/codeql.yml@acba5fb15ac98ad23dec1ad233e40e1bb79c1dae" # v19.0.4
        with:
            languages: "[\"javascript-typescript\"]"
            branches: "[\"main\", \"alpha\", \"next\", \"beta\"]"
