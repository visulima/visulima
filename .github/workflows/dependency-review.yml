name: "Dependency review"
on:
    pull_request:
        branches: ["main", "alpha", "next", "beta"]
permissions: {}
concurrency:
    group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
    cancel-in-progress: true
jobs:
    dependency-review:
        permissions:
            contents: "read"
            pull-requests: "write"
        uses: "anolilab/workflows/.github/workflows/dependency-review.yml@992a32d56bf8961a317c8d7aa5ec68af4487ae79" # v20.2.0
