name: "Dependency review"
on:
    pull_request:
        branches: ["main", "alpha", "next", "beta"]
permissions: {}
concurrency:
    group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
    cancel-in-progress: true
jobs:
    dependency-review:
        permissions:
            contents: "read"
            pull-requests: "write"
        uses: "anolilab/workflows/.github/workflows/dependency-review.yml@acba5fb15ac98ad23dec1ad233e40e1bb79c1dae" # v19.0.4
