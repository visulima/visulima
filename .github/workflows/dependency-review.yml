name: "Dependency review"
on:
    pull_request:
        branches: ["main", "alpha", "next", "beta"]
permissions: {}
concurrency:
    group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
    cancel-in-progress: true
jobs:
    dependency-review:
        permissions:
            contents: "read"
            pull-requests: "write"
        uses: "anolilab/workflows/.github/workflows/dependency-review.yml@aa162a984a4909f412bc4dbae712def066a0a681" # v20.2.5
