<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>JSON Formatter</title>
        <style>
            :root {
                color-scheme: dark;
                --bg: #0f0f11;
                --surface: #18181b;
                --surface-2: #1f1f23;
                --border: #2e2e33;
                --text: #e4e4e7;
                --text-muted: #71717a;
                --primary: #caff00;
                --primary-dim: rgba(202, 255, 0, 0.08);
                --error: #f87171;
                --success: #4ade80;
                --string: #86efac;
                --number: #7dd3fc;
                --boolean: #c4b5fd;
                --null-color: #f87171;
                --key: #e4e4e7;
                --radius: 4px;
                font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
                font-size: 13px;
                line-height: 1.5;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background: var(--bg);
                color: var(--text);
                height: 100vh;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            header {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 10px 14px;
                border-bottom: 1px solid var(--border);
                background: var(--surface);
                flex-shrink: 0;
            }

            header h1 {
                font-size: 0.7rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: var(--text-muted);
            }

            header h1 span {
                color: var(--primary);
                margin-right: 4px;
            }

            .status {
                margin-left: auto;
                font-size: 0.68rem;
                font-weight: 600;
            }
            .status.ok {
                color: var(--success);
            }
            .status.err {
                color: var(--error);
            }

            main {
                display: flex;
                flex: 1;
                overflow: hidden;
            }

            .pane {
                display: flex;
                flex-direction: column;
                flex: 1;
                overflow: hidden;
            }
            .pane + .pane {
                border-left: 1px solid var(--border);
            }

            .pane-header {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 6px 12px;
                border-bottom: 1px solid var(--border);
                background: var(--surface-2);
                flex-shrink: 0;
            }

            .pane-label {
                font-size: 0.62rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: var(--text-muted);
            }

            .pane-actions {
                margin-left: auto;
                display: flex;
                gap: 4px;
            }

            button {
                background: transparent;
                border: 1px solid var(--border);
                color: var(--text-muted);
                padding: 3px 10px;
                border-radius: var(--radius);
                font-family: inherit;
                font-size: 0.68rem;
                font-weight: 600;
                cursor: pointer;
                transition:
                    color 0.12s,
                    background 0.12s,
                    border-color 0.12s;
            }

            button:hover {
                color: var(--text);
                border-color: var(--text-muted);
                background: rgba(255, 255, 255, 0.04);
            }

            button.primary {
                border-color: var(--primary);
                color: var(--primary);
                background: var(--primary-dim);
            }

            button.primary:hover {
                background: rgba(202, 255, 0, 0.15);
            }

            textarea {
                flex: 1;
                background: var(--bg);
                color: var(--text);
                border: none;
                resize: none;
                padding: 12px;
                font-family: inherit;
                font-size: 12.5px;
                line-height: 1.65;
                outline: none;
                overflow: auto;
            }

            textarea::placeholder {
                color: var(--text-muted);
                opacity: 0.5;
            }

            #output {
                flex: 1;
                overflow: auto;
                padding: 12px;
                font-size: 12.5px;
                line-height: 1.65;
                white-space: pre;
            }

            #output .empty {
                color: var(--text-muted);
                font-style: italic;
                opacity: 0.5;
            }
            #output .err-msg {
                color: var(--error);
            }

            .tok-s {
                color: var(--string);
            }
            .tok-n {
                color: var(--number);
            }
            .tok-b {
                color: var(--boolean);
            }
            .tok-nil {
                color: var(--null-color);
            }
            .tok-k {
                color: var(--key);
            }
            .tok-p {
                color: var(--text-muted);
            }
        </style>
    </head>
    <body>
        <header>
            <h1><span>//</span> JSON Formatter</h1>
            <span class="status" id="status"></span>
        </header>
        <main>
            <div class="pane">
                <div class="pane-header">
                    <span class="pane-label">Input</span>
                    <div class="pane-actions">
                        <button id="btn-sample">Sample</button>
                        <button id="btn-clear">Clear</button>
                        <button class="primary" id="btn-format">Format ↵</button>
                    </div>
                </div>
                <textarea id="input" placeholder="Paste JSON here and click Format, or press Ctrl+Enter…" spellcheck="false"></textarea>
            </div>
            <div class="pane">
                <div class="pane-header">
                    <span class="pane-label">Output</span>
                    <div class="pane-actions">
                        <button id="btn-copy">Copy</button>
                        <button id="btn-minify">Minify</button>
                    </div>
                </div>
                <div id="output"></div>
            </div>
        </main>

        <script>
            var inputEl = document.getElementById("input");
            var outputEl = document.getElementById("output");
            var statusEl = document.getElementById("status");

            var SAMPLE = {
                name: "@visulima/dev-toolbar",
                version: "1.0.0",
                description: "Iframe app example — loaded via view.type = 'iframe'",
                features: ["inline apps", "iframe apps", "init apps"],
                config: { port: 5173, open: false, host: "localhost" },
                active: true,
                count: 7,
                ratio: 0.618,
                empty: null,
            };

            var TOKEN_RE = /("(?:\\[\s\S]|[^"\\])*"(?:\s*:)?|true|false|null|-?(?:0|[1-9]\d*)(?:\.\d+)?(?:[eE][+-]?\d+)?|[{}\[\],:])/g;

            function buildHighlightedDom(jsonStr) {
                var fragment = document.createDocumentFragment();
                var tokens = jsonStr.split(TOKEN_RE);

                for (var i = 0; i < tokens.length; i++) {
                    var token = tokens[i];
                    if (!token) continue;

                    // Odd indices are captured groups (actual tokens), even are separators (whitespace/newlines)
                    if (i % 2 === 0) {
                        fragment.appendChild(document.createTextNode(token));
                        continue;
                    }

                    var span = document.createElement("span");
                    span.textContent = token;

                    if (token.charAt(0) === '"') {
                        span.className = token.charAt(token.length - 1) === ":" ? "tok-k" : "tok-s";
                    } else if (token === "true" || token === "false") {
                        span.className = "tok-b";
                    } else if (token === "null") {
                        span.className = "tok-nil";
                    } else if (token === "{" || token === "}" || token === "[" || token === "]" || token === "," || token === ":") {
                        span.className = "tok-p";
                    } else {
                        span.className = "tok-n";
                    }

                    fragment.appendChild(span);
                }

                return fragment;
            }

            function countNodes(val) {
                if (val === null || typeof val !== "object") return 1;
                var keys = Object.keys(val);
                var total = keys.length;
                for (var i = 0; i < keys.length; i++) total += countNodes(val[keys[i]]);
                return total;
            }

            function setStatus(text, ok) {
                statusEl.textContent = text;
                statusEl.className = "status " + (ok ? "ok" : "err");
            }

            function clearOutput() {
                while (outputEl.firstChild) outputEl.firstChild.remove();
            }

            function showEmpty() {
                var em = document.createElement("span");
                em.className = "empty";
                em.textContent = "Formatted output will appear here.";
                outputEl.appendChild(em);
            }

            function format() {
                var raw = inputEl.value.trim();
                clearOutput();

                if (!raw) {
                    showEmpty();
                    statusEl.textContent = "";
                    return;
                }

                try {
                    var parsed = JSON.parse(raw);
                    var pretty = JSON.stringify(parsed, null, 2);
                    outputEl.appendChild(buildHighlightedDom(pretty));
                    setStatus("✓ Valid JSON · " + countNodes(parsed) + " nodes", true);
                } catch (err) {
                    var msg = document.createElement("span");
                    msg.className = "err-msg";
                    msg.textContent = "✗ " + err.message;
                    outputEl.appendChild(msg);
                    setStatus("✗ Invalid JSON", false);
                }
            }

            document.getElementById("btn-format").addEventListener("click", format);

            document.getElementById("btn-sample").addEventListener("click", function () {
                inputEl.value = JSON.stringify(SAMPLE, null, 2);
                format();
            });

            document.getElementById("btn-clear").addEventListener("click", function () {
                inputEl.value = "";
                clearOutput();
                showEmpty();
                statusEl.textContent = "";
            });

            document.getElementById("btn-minify").addEventListener("click", function () {
                var raw = inputEl.value.trim();
                if (!raw) return;
                try {
                    var minified = JSON.stringify(JSON.parse(raw));
                    inputEl.value = minified;
                    clearOutput();
                    outputEl.appendChild(buildHighlightedDom(minified));
                    setStatus("✓ Minified · " + minified.length + " chars", true);
                } catch (_) {
                    setStatus("✗ Invalid JSON", false);
                }
            });

            document.getElementById("btn-copy").addEventListener("click", function () {
                var text = outputEl.textContent;
                if (!text) return;
                navigator.clipboard.writeText(text).then(function () {
                    var btn = document.getElementById("btn-copy");
                    btn.textContent = "Copied!";
                    setTimeout(function () {
                        btn.textContent = "Copy";
                    }, 1200);
                });
            });

            inputEl.addEventListener("keydown", function (e) {
                if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    format();
                }
            });

            showEmpty();
        </script>
    </body>
</html>
