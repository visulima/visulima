[package]
name = "secret-scanner-native"
version = "0.1.0"
edition = "2021"
license = "MIT"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3", features = ["async", "serde-json"] }
napi-derive = "3"
regex = "1"
fancy-regex = "0.18"
aho-corasick = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ignore = "0.4"
walkdir = "2"
rayon = "1"
memmap2 = "0.9"
encoding_rs = "0.8"
once_cell = "1"
thiserror = "2"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
strip = "symbols"
panic = "unwind"
