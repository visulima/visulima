title = "password-manager"
description = "Detect committed password-manager export files (1Password 1PUX, Bitwarden JSON, LastPass CSV, KeePass KDBX/XML, Chrome/Firefox CSV). Intended as an additive overlay on top of the default ruleset — gates on filename signatures + content fingerprints."

# 1Password "1PUX" export (ZIP archive of a JSON bundle). The JSON header inside always
# carries `"accounts":[{"attrs":{"accountName":` before any real data — cheap to fingerprint.

[[rules]]
id = "1password-1pux-export"
description = "1Password 1PUX export bundle — contains all stored vault items"
regex = '''"accounts"\s*:\s*\[\s*\{\s*"attrs"\s*:\s*\{\s*"accountName"'''
keywords = [
  "accountName",
  "1PUX"
]
priority = 5
tags = [
  "password-manager",
  "1password"
]

[[rules]]
id = "1password-1pif-export"
description = "1Password 1PIF export — plaintext JSON item-per-line format (legacy export)"
regex = '''\*\*\*[a-f0-9]{32}\*\*\*'''
keywords = [
  "1pif",
  "1Password"
]
path = '''(?i)\.1pif(?:$|/)'''
priority = 5
tags = [
  "password-manager",
  "1password"
]

# ---------------------------------------------------------------------------
# Bitwarden JSON export (unencrypted). Header ships `"encrypted":false,"folders":[]`.
# Encrypted exports (`.json` with `encryptedString`) are likewise flagged as they shouldn't
# live in a repo either.

[[rules]]
id = "bitwarden-unencrypted-export"
description = "Bitwarden unencrypted JSON vault export"
regex = '''"encrypted"\s*:\s*false\s*,\s*"folders"\s*:'''
keywords = [
  "encrypted",
  "folders"
]
priority = 5
tags = [
  "password-manager",
  "bitwarden"
]

[[rules]]
id = "bitwarden-encrypted-export"
description = "Bitwarden encrypted JSON vault export (even encrypted dumps shouldn't be committed)"
regex = '''"encrypted"\s*:\s*true\s*,\s*"passwordProtected"'''
keywords = [ "passwordProtected" ]
priority = 5
tags = [
  "password-manager",
  "bitwarden"
]

# ---------------------------------------------------------------------------
# LastPass CSV export. Header is fixed and unique.

[[rules]]
id = "lastpass-csv-export"
description = "LastPass CSV export — canonical header row"
regex = '''^url\s*,\s*username\s*,\s*password\s*,\s*(?:totp\s*,\s*)?extra\s*,\s*name\s*,\s*grouping\s*,\s*fav'''
keywords = [
  "url,username,password",
  "LastPass"
]
priority = 5
tags = [
  "password-manager",
  "lastpass"
]

# ---------------------------------------------------------------------------
# KeePass. Binary `.kdbx` files can't be regex-scanned but the extension is enough.
# The XML export opens with a distinctive PasswordSafe signature.

[[rules]]
id = "keepass-kdbx-file"
description = "KeePass KDBX database file present in repository"
path = '''(?i)\.kdbx$'''
priority = 5
tags = [
  "password-manager",
  "keepass"
]

[[rules]]
id = "keepass-xml-export"
description = "KeePass XML export — canonical root element + meta block"
regex = '''<KeePassFile>\s*<Meta>\s*<Generator>KeePass'''
keywords = [
  "<KeePassFile>",
  "KeePass"
]
priority = 5
tags = [
  "password-manager",
  "keepass"
]

# ---------------------------------------------------------------------------
# Browser-native exports (Chromium / Firefox) share the same CSV header.

[[rules]]
id = "browser-password-csv-export"
description = "Chrome / Edge / Firefox password manager CSV export"
regex = '''^name\s*,\s*url\s*,\s*username\s*,\s*password(?:\s*,\s*note)?\s*$'''
keywords = [ "name,url,username,password" ]
priority = 5
tags = [
  "password-manager",
  "browser"
]

# ---------------------------------------------------------------------------
# 1Password CLI session tokens — these surface in scripts and CI logs.

[[rules]]
id = "1password-session-token"
description = "1Password CLI session token (OP_SESSION_* env var)"
regex = '''(?i)OP_SESSION_[A-Z0-9_]+\s*=\s*["']?([A-Za-z0-9_\-]{40,})["']?'''
keywords = [ "OP_SESSION_" ]
entropy = 3.5
secretGroup = 1
priority = 5
tags = [
  "password-manager",
  "1password"
]

# ---------------------------------------------------------------------------
# Path-only catch-alls for common export paths.

[[rules]]
id = "password-manager-export-path"
description = "File path matches a password-manager export convention"
# Requires an explicit `*-export` / `*-dump` / `*-backup` suffix so bare `secrets.json`,
# `credentials.csv` etc. (common K8s / Ansible / npm-audit filenames) don't FP. The
# signature-based rules above catch real exports regardless of filename.
path = '''(?i)(?:^|/)(?:password|vault|credentials?|secrets?|passbook|keychain)[-_.](?:export|dump|backup|archive)\.(?:csv|json|1pif|xml|kdbx)$'''
priority = 5
tags = [ "password-manager" ]
