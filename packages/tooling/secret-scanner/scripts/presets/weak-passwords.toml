title = "weak-passwords"
description = "Low-entropy credential patterns commonly missed by the stock gitleaks ruleset. Intended as an additive overlay on top of the default gitleaks + Kingfisher ruleset (1,047 rules)."

[[rules]]
id = "low-entropy-api-key"
description = "Low-entropy API key / password / secret assigned to a credential-ish variable name. Complements generic-api-key (entropy 3.0) by catching weaker values that still look like real secrets."
regex = '''(?i)[\w.-]{0,50}?(?:access|auth|(?-i:[Aa]pi|API)|credential|creds|key|passwd|password|secret|token)(?:[ \t\w.-]{0,20})(?:[\s|']|[\s|"]){0,3}(?:=|>|:{1,3}=|\|\|:|<=|=>|:|\?=)(?:'|"|\s|=|`){0,5}([\w.=-]{5,150})(?:['|"|\n|\r|\s|`|;]|$)'''
entropy = 2.0
secretGroup = 1
keywords = [
  "access",
  "api",
  "auth",
  "key",
  "credential",
  "creds",
  "passwd",
  "password",
  "secret",
  "token",
]

[[rules.allowlists]]
description = "Obvious placeholder values that pretend to be secrets in docs/fixtures."
regexTarget = "secret"
stopwords = [
  "changeme",
  "example",
  "fake",
  "fixture",
  "localhost",
  "password",
  "placeholder",
  "sample",
  "secret",
  "test",
  "todo",
  "xxxxxx",
  "your-",
  "your_",
]
