[package]
name = "vis-native"
version = "0.1.0"
edition = "2021"
license = "MIT"

[lib]
crate-type = [ "cdylib" ]

[dependencies]
ec4rs = "1"
napi = "3"
napi-derive = "3"
prek-identify = "0.3.13"
serde_json = "1"
sort-package-json = "0.0.12"
which = "8"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
strip = "symbols"
panic = "unwind"
