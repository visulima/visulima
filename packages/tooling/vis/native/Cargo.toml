[package]
name = "vis-native"
version = "0.1.0"
edition = "2021"
license = "MIT"

# `rlib` is added alongside `cdylib` so the in-crate criterion benches
# (native/benches/) can link the pure transpile/sort logic. `napi build` still
# consumes the `cdylib` for the `.node` artifact; the extra `rlib` does not
# affect the shipped addon.
[lib]
crate-type = [
  "cdylib",
  "rlib"
]

[dependencies]
blake3 = "1"
ec4rs = "1"
napi = { version = "3", features = [ "async" ] }
napi-derive = "3"
oxc_allocator = "=0.136.0"
oxc_codegen = "=0.136.0"
oxc_parser = "=0.136.0"
oxc_semantic = "=0.136.0"
oxc_span = "=0.136.0"
oxc_transformer = "=0.136.0"
pep440_rs = "0.7"
prek-identify = "0.3.13"
rusqlite = { version = "0.32", features = [
  "bundled",
  "blob"
] }
semver = "1"
serde = { version = "1", features = [ "derive" ] }
serde_json = "1"
sort-package-json = "0.0.12"
which = "8"
zip = { version = "2", default-features = false, features = [ "deflate" ] }

[build-dependencies]
napi-build = "2"

[dev-dependencies]
# `codspeed-criterion-compat` is a drop-in for criterion: same API (imported as
# `criterion` via the package rename), so the bench sources are unchanged. Plain
# `cargo bench` falls back to vanilla criterion locally; under `cargo codspeed`
# (the CodSpeed CI path in .github/workflows/codspeed.yml) it emits instrumented
# measurements. Pinned to the 4.x line to match `CodSpeedHQ/action@v4`.
criterion = { package = "codspeed-criterion-compat", version = "4", default-features = false, features = [ "cargo_bench_support" ] }

# Native micro-benchmarks (criterion). nubjs/nub#17 documented a "transpile
# benchmark gap"; this closes ours by measuring the oxc TS→JS hot path
# (`vis x` / config / generator loading) directly, free of the Node-boot floor
# the hyperfine/vitest harness is bound by. Run with `cargo bench`.
[[bench]]
name = "transform"
harness = false

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
strip = "symbols"
panic = "unwind"
