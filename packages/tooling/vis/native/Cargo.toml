[package]
name = "vis-native"
version = "0.1.0"
edition = "2021"
license = "MIT"

[lib]
crate-type = [ "cdylib" ]

[dependencies]
blake3 = "1"
ec4rs = "1"
napi = { version = "3", features = [ "async" ] }
napi-derive = "3"
oxc_allocator = "=0.136.0"
oxc_codegen = "=0.136.0"
oxc_parser = "=0.136.0"
oxc_semantic = "=0.136.0"
oxc_span = "=0.136.0"
oxc_transformer = "=0.136.0"
pep440_rs = "0.7"
prek-identify = "0.3.13"
rusqlite = { version = "0.32", features = [
  "bundled",
  "blob"
] }
semver = "1"
serde = { version = "1", features = [ "derive" ] }
serde_json = "1"
sort-package-json = "0.0.12"
which = "8"
zip = { version = "2", default-features = false, features = [ "deflate" ] }

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
strip = "symbols"
panic = "unwind"
