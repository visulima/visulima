# Shared pure logic for the vis native front-end. This crate holds the
# package-manager detection + command-resolution logic the CLI binary needs,
# ported faithfully (de-napi'd) from the addon's pm_detect.rs / pm_resolve.rs.
#
# It is a COPY, not an extraction: the addon keeps its own `#[napi]` copies
# because the addon can't be rebuilt/verified in every environment (oxc needs a
# newer toolchain). When the addon builds cleanly everywhere, the addon's napi
# wrappers should be re-pointed at this crate to collapse the duplication.
#
# Pure std + serde_json only — no napi, so the lean CLI build stays fast.
[package]
name = "vis-core"
version = "0.1.0"
edition = "2021"
license = "MIT"
publish = false

[lib]
crate-type = [ "rlib" ]

[dependencies]
serde_json = "1"
