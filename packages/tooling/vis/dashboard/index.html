<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>vis · dashboard</title>
        <script>
            // Theme bootstrap: persisted choice wins, otherwise follow OS. This
            // runs before React mounts so there's no flash. JS only flips
            // data-theme; CSS handles the colors.
            (function () {
                try {
                    const stored = localStorage.getItem("vis-dashboard-theme");
                    if (stored === "light" || stored === "dark") {
                        document.documentElement.dataset.theme = stored;
                    }
                } catch {}
            })();
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
