lockfileVersion: '9.0'

settings:
    autoInstallPeers: true
    excludeLinksFromLockfile: false

importers:

    .: {}

    packages/api:
        dependencies:
            shared:
                specifier: workspace:*
                version: link:../shared
            fastify:
                specifier: ^4.28.1
                version: 4.28.1

    packages/shared: {}

    packages/unused:
        dependencies:
            lodash:
                specifier: ^4.17.21
                version: 4.17.21

packages:

    fastify@4.28.1:
        resolution: {integrity: sha512-fake-fastify-hash}

    lodash@4.17.21:
        resolution: {integrity: sha512-fake-lodash-hash}

snapshots:

    fastify@4.28.1: {}

    lodash@4.17.21: {}
