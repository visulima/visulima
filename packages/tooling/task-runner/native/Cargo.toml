[package]
name = "task-runner-native"
version = "0.1.0"
edition = "2021"
license = "MIT"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3", features = ["async"] }
napi-derive = "3"
xxhash-rust = { version = "0.8", features = ["xxh3"] }
walkdir = "2"
rayon = "1"
tokio = { version = "1", features = ["rt-multi-thread", "process", "io-util", "signal", "sync", "time", "macros"] }

[target.'cfg(unix)'.dependencies]
nix = { version = "0.31", features = ["signal", "process"] }

# Linux glibc file-access tracker via seccomp_unotify. Gated to
# `target_env = "gnu"` because libseccomp-sys dynamically links the
# system libseccomp, which cargo-zigbuild can't cross-compile into
# musl/aarch64 sysroots without bespoke setup. The Alpine CI job
# builds the crate directly on musl (apk-installed libseccomp-dev)
# to keep that path alive without requiring it in the main matrix.
[target.'cfg(all(target_os = "linux", target_env = "gnu"))'.dependencies]
fspy-seccomp = { path = "./fspy_seccomp" }

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61", features = ["Win32_System_Console", "Win32_System_JobObjects", "Win32_System_Threading", "Win32_Foundation", "Win32_Security"] }

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
strip = "symbols"
panic = "unwind"
