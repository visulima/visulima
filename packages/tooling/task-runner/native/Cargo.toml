[package]
name = "task-runner-native"
version = "0.1.0"
edition = "2021"
license = "MIT"

# `rlib` is added alongside `cdylib` so the in-crate criterion benches
# (native/benches/) can link the pure graph/hash logic. The napi build
# (`napi build`) still consumes the `cdylib` for the `.node` artifact; the
# extra `rlib` has no effect on the shipped addon.
[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
napi = { version = "3", features = ["async"] }
napi-derive = "3"
rustc-hash = "2"
xxhash-rust = { version = "0.8", features = ["xxh3"] }
walkdir = "2"
rayon = "1"
tokio = { version = "1", features = ["rt-multi-thread", "process", "io-util", "signal", "sync", "time", "macros"] }

[target.'cfg(unix)'.dependencies]
nix = { version = "0.31", features = ["signal", "process"] }

# Linux file-access tracker via seccomp_unotify. Pure Rust, no
# system libraries — fspy_seccomp talks to the kernel directly via
# raw `seccomp(2)` + ioctl. Works on every Linux target (gnu, musl,
# aarch64, riscv64) with no C dependency.
[target.'cfg(target_os = "linux")'.dependencies]
fspy-seccomp = { path = "./fspy_seccomp" }

# macOS interpose tracker (native/src/macos.rs) talks to libc directly for the
# socketpair + datagram recv + fd flags. The injected dylib lives in the
# separate `fspy_macos` cdylib (NOT a dependency here — its `__interpose`
# section must never link into the parent addon).
[target.'cfg(target_os = "macos")'.dependencies]
libc = "0.2.178"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61", features = [
  "Win32_System_Console",
  "Win32_System_JobObjects",
  "Win32_System_Threading",
  "Win32_Foundation",
  "Win32_Security",
  # Windows file-access tracker parent (native/src/windows.rs): suspended
  # process creation + CreateRemoteThread(LoadLibraryW) DLL injection + a
  # per-spawn named-pipe server that drains the injected fspy_windows DLL.
  "Win32_System_Memory",
  "Win32_System_LibraryLoader",
  "Win32_System_Diagnostics_Debug",
  "Win32_System_Pipes",
  "Win32_Storage_FileSystem",
  "Win32_System_IO",
] }

[build-dependencies]
napi-build = "2"

[dev-dependencies]
criterion = { version = "0.5", default-features = false, features = ["cargo_bench_support"] }

# Native micro-benchmarks (criterion). Mirrors the cache-hash + workspace/topo
# suite from nubjs/nub#17, but measures OUR Rust hot paths directly — the layer
# the hyperfine/vitest harness in packages/tooling/vis/__bench__ cannot isolate
# because the Node-boot floor swamps it. Run with `cargo bench`.
[[bench]]
name = "graph"
harness = false

[[bench]]
name = "file_hasher"
harness = false

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
strip = "symbols"
panic = "unwind"
