[package]
name = "task-runner-native"
version = "0.1.0"
edition = "2021"
license = "MIT"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3", features = ["async"] }
napi-derive = "3"
xxhash-rust = { version = "0.8", features = ["xxh3"] }
walkdir = "2"
rayon = "1"
tokio = { version = "1", features = ["rt-multi-thread", "process", "io-util", "signal", "sync", "time", "macros"] }

[target.'cfg(unix)'.dependencies]
nix = { version = "0.31", features = ["signal", "process"] }

# Linux file-access tracker via seccomp_unotify. Pure Rust, no
# system libraries — fspy_seccomp talks to the kernel directly via
# raw `seccomp(2)` + ioctl. Works on every Linux target (gnu, musl,
# aarch64, riscv64) with no C dependency.
[target.'cfg(target_os = "linux")'.dependencies]
fspy-seccomp = { path = "./fspy_seccomp" }

# macOS interpose tracker (native/src/macos.rs) talks to libc directly for the
# socketpair + datagram recv + fd flags. The injected dylib lives in the
# separate `fspy_macos` cdylib (NOT a dependency here — its `__interpose`
# section must never link into the parent addon).
[target.'cfg(target_os = "macos")'.dependencies]
libc = "0.2.178"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61", features = ["Win32_System_Console", "Win32_System_JobObjects", "Win32_System_Threading", "Win32_Foundation", "Win32_Security"] }

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
strip = "symbols"
panic = "unwind"
