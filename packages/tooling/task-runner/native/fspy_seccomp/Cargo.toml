[package]
name = "fspy-seccomp"
version = "0.0.0"
edition = "2021"
license = "MIT"
publish = false
description = "WIP — Linux seccomp_unotify file-access tracker. See ../../rfc/design-fspy-seccomp-unotify.md."

[lib]
crate-type = ["cdylib", "rlib"]

# Per-spawn helper. The parent NAPI binding posix_spawns this binary
# (multi-thread-safe; sidesteps the fork-from-multithreaded problem
# of installing seccomp in pre_exec from Node's tokio runtime). The
# helper installs the filter on itself in a clean single-threaded
# process, sends notify_fd back via SCM_RIGHTS, then execves the
# target command.
[[bin]]
name = "fspy-seccomp-helper"
path = "src/bin/helper.rs"
required-features = []

[target.'cfg(target_os = "linux")'.dependencies]
libseccomp-sys = "0.2"
libc = "0.2"
# `socket` + `uio` swap our hand-rolled libc calls (socket, bind,
# listen, accept, sendmsg/recvmsg with SCM_RIGHTS, process_vm_readv)
# for safe nix wrappers — ~150 lines of `unsafe` → ~60 of safe code,
# and the cmsg buffer alignment problem (cmsghdr requires size_t
# alignment) goes away because nix manages those buffers.
nix = { version = "0.31", features = ["fs", "process", "signal", "sched", "socket", "uio", "poll"] }

# [profile.release] intentionally omitted — Cargo only honors
# `[profile.*]` from the workspace root. The native/ root Cargo.toml's
# release profile (lto = true, codegen-units = 1, strip = "symbols")
# governs both task-runner-native and the helper binary built here.
