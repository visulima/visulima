github_checks:
    annotations: true

# PR CI runs `test:affected`, so each PR uploads coverage flags only for the
# packages it touched (e.g. just `vis`). Without carryforward, codecov's
# project aggregate collapses to that affected subset — a sub-75% package then
# fails the gate even though nothing regressed (base aggregate is ~75.77%).
# Carry every unchanged flag forward from its last upload so the project number
# reflects the whole repo with only the affected packages updated.
flag_management:
    default_rules:
        carryforward: true

# Always comment on PRs, always create new comments
comment:
    layout: "newheader, diff, flags, files"
    require_changes: false # if true: only post the comment if coverage changes
    require_base: false # [yes :: must have a base report to post]
    require_head: true # [yes :: must have a head report to post]
    show_carryforward_flags: true
    show_critical_paths: true # new option to labeled critical files
    hide_comment_details: true # collapse all the "detailed info" for the PR comment

# Require a minimum coverage for the codecov/project PR check
coverage:
    status:
        patch: off # yamllint disable-line rule:truthy
        project:
            default:
                target: "75%" # overall project/ repo coverage
                threshold: "1%"
